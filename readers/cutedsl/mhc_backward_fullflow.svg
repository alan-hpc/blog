<svg viewBox="0 0 1180 880" xmlns="http://www.w3.org/2000/svg" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'><defs><marker id="ar" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6 Z" fill="#555555"/></marker><marker id="arr" markerWidth="11" markerHeight="11" refX="8" refY="3.2" orient="auto"><path d="M0,0 L8,3.2 L0,6.4 Z" fill="#d6342c"/></marker></defs><rect x="0" y="0" width="1180" height="880" fill="#ffffff"/><text x="590.0" y="34" font-size="19" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>mHC 完整结构 · 反向全流程：梯度沿 pre / post / res 三条路径回传到 x_l</text><text x="590.0" y="56" font-size="12.5" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>δ ≡ ∂L/∂x；下游梯度 × 本地偏导（VJP），x_l 汇总三条路径之和（path-sum）</text><rect x="40" y="80" width="230" height="78" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.6"/><text x="155.0" y="102" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>∂L/∂x_l  (累加)</text><text x="155.0" y="122" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>= res + pre + 预测 三路之和</text><text x="155.0" y="138" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>T × n × C</text><rect x="560" y="80" width="210" height="78" rx="8" fill="#fde7e9" stroke="#d6342c" stroke-width="1.6"/><text x="665.0" y="102" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>RMSNorm 反向</text><text x="665.0" y="122" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>x_l_grad += r(x̄_grad</text><text x="665.0" y="138" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>  − (c/G) x̄)</text><rect x="900" y="80" width="240" height="90" rx="8" fill="#fde7e9" stroke="#d6342c" stroke-width="1.6"/><text x="1020.0" y="102" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Linear φ 反向</text><text x="1020.0" y="122" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>x̄_grad = z_grad · Wφᵀ</text><text x="1020.0" y="138" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Wφ_grad = x̄ᵀ · z_grad</text><text x="1020.0" y="154" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>（pre-norm-fn 反向）</text><rect x="900" y="300" width="240" height="96" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="1020.0" y="322" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Raw heads 反向 (concat)</text><text x="1020.0" y="342" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>z_grad : T×(2n+n²)</text><text x="1020.0" y="358" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>= [H̃pre_g | H̃post_g | H̃res_g]</text><text x="1020.0" y="374" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>激活反向: ·σ′ / ·2σ′ / Sinkhorn</text><rect x="660" y="188" width="170" height="70" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="745.0" y="210" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>H^pre 反向</text><text x="745.0" y="230" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>H̃pre_g = Hpre_g·σ′</text><text x="745.0" y="246" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>shape: T×n</text><rect x="660" y="312" width="170" height="78" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="745.0" y="334" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>H^res 反向</text><text x="745.0" y="354" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Hres_g via Sinkhorn</text><text x="745.0" y="370" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>-bwd (recompute)</text><text x="745.0" y="386" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>shape: T×n×n</text><rect x="660" y="444" width="170" height="70" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="745.0" y="466" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>H^post 反向</text><text x="745.0" y="486" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>H̃post_g = Hpost_g·2σ′</text><text x="745.0" y="502" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>shape: T×n</text><rect x="40" y="188" width="250" height="96" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="165.0" y="210" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Pre path 反向</text><text x="165.0" y="230" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>u_grad ← Layer F 反向</text><text x="165.0" y="246" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>x_l_grad += Hpre[t,s]·u_grad[t,c]</text><text x="165.0" y="262" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hpre_g[t,s] = Σ_c u_grad·x_l</text><rect x="40" y="322" width="250" height="70" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.6"/><text x="165.0" y="344" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Layer F 反向</text><text x="165.0" y="364" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>u_grad = J_Fᵀ · v_grad</text><text x="165.0" y="380" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>in: v_grad → out: u_grad</text><rect x="355" y="312" width="250" height="96" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="480.0" y="334" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Residual path 反向</text><text x="480.0" y="354" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>x_l_grad += Σ_r Hres[t,r,s]·δ[t,r,c]</text><text x="480.0" y="370" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hres_g[t,r,s] = Σ_c δ[t,r,c]·x_l[t,s,c]</text><text x="480.0" y="386" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>per-token n×n 转置矩阵乘</text><rect x="40" y="450" width="250" height="96" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="1.6"/><text x="165.0" y="472" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>Post path 反向</text><text x="165.0" y="492" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>v_grad = Σ_s Hpost[t,s]·δ[t,s,c]</text><text x="165.0" y="508" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hpost_g[t,s] = Σ_c δ[t,s,c]·v[t,c]</text><text x="165.0" y="524" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>broadcast 的反向 = 沿流求和</text><circle cx="165" cy="610" r="26" fill="#fff" stroke="#555555" stroke-width="2"/><text x="165" y="617" font-size="24" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>+</text><rect x="95" y="670" width="150" height="70" rx="8" fill="#f5f5f5" stroke="#999999" stroke-width="1.6"/><text x="170.0" y="692" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>∂L/∂x_{l+1}</text><text x="170.0" y="712" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>= δ_{l+1}</text><text x="170.0" y="728" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>T × n × C</text><line x1="165" y1="668" x2="165" y2="638" stroke="#555555" stroke-width="2.2" marker-end="url(#ar)"/><line x1="165" y1="584" x2="165" y2="548" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="230" y="568" font-size="10.5" fill="#666666" text-anchor="start" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>δ 拷贝到两支</text><line x1="190" y1="600" x2="430" y2="410" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><path d="M 245 700 H 700 C 760 700 760 200 760 150 L 270 119" fill="none" stroke="#d6342c" stroke-width="2.6" stroke-dasharray="2 0" marker-end="url(#arr)"/><text x="720" y="690" font-size="11" fill="#d6342c" text-anchor="start" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>残差高速路：δ 经 Hresᵀ 直达 x_l</text><line x1="110" y1="448" x2="110" y2="394" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="150" y="420" font-size="10.5" fill="#666666" text-anchor="start" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>v_grad</text><line x1="110" y1="320" x2="110" y2="286" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="150" y="305" font-size="10.5" fill="#666666" text-anchor="start" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>u_grad</text><line x1="292" y1="220" x2="658" y2="220" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><text x="470" y="212" font-size="10" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hpre_g</text><line x1="607" y1="350" x2="658" y2="350" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><text x="632" y="342" font-size="9.5" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hres_g</text><line x1="292" y1="490" x2="658" y2="480" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><text x="470" y="472" font-size="10" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Hpost_g</text><line x1="832" y1="220" x2="1010" y2="300" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><line x1="832" y1="350" x2="898" y2="350" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><line x1="832" y1="480" x2="1010" y2="396" stroke="#555555" stroke-width="1.6" marker-end="url(#ar)"/><line x1="1020" y1="298" x2="1020" y2="172" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="1075" y="240" font-size="10.5" fill="#666666" text-anchor="start" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>z_grad</text><line x1="898" y1="120" x2="772" y2="120" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="835" y="112" font-size="10.5" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>x̄_grad</text><line x1="558" y1="120" x2="272" y2="120" stroke="#555555" stroke-width="1.8" marker-end="url(#ar)"/><text x="415" y="112" font-size="10.5" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>预测路 x_l_grad</text><line x1="355" y1="330" x2="200" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#ar)" stroke-dasharray="5 4"/><line x1="120" y1="186" x2="130" y2="160" stroke="#555555" stroke-width="1.5" marker-end="url(#ar)" stroke-dasharray="5 4"/><text x="250" y="150" font-size="9.5" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>res 路</text><rect x="900" y="430" width="240" height="60" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="1.6"/><text x="1020.0" y="452" font-size="14" fill="#1a1a1a" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>参数梯度</text><text x="1020.0" y="472" font-size="11" fill="#666666" text-anchor="middle" font-weight="normal" font-family='"SF Mono",Menlo,Consolas,monospace'>Wφ_grad, α_grad, b_grad</text><line x1="1020" y1="396" x2="1020" y2="428" stroke="#555555" stroke-width="1.4" marker-end="url(#ar)"/><rect x="40" y="770" width="1100" height="84" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/><text x="590.0" y="800" font-size="13.5" fill="#7a5b00" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>x_l 的梯度 = 三条路径之和：res 路（Σ_r Hresᵀ·δ）+ pre 路（Hpre·u_grad）+ 预测路（RMSNorm∘Linear∘激活 反向）</text><text x="590.0" y="826" font-size="12" fill="#7a5b00" text-anchor="middle" font-weight="normal" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>pre = 沿流加权求和的反向；post = 沿流求和（广播的反向）；res = 沿流的 n×n 矩阵乘转置</text><text x="590.0" y="845" font-size="11.5" fill="#d6342c" text-anchor="middle" font-weight="bold" font-family='-apple-system,"PingFang SC","Microsoft YaHei",Helvetica,Arial,sans-serif'>红框 = pre-norm-fn（RMSNorm + Linear），本文 CuteDSL kernel 负责的部分</text></svg>