<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="500" viewBox="0 0 1000 500" role="img" aria-label="MTP 与 DSA 优化的是 decode 乘法项">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { letter-spacing: 0; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="40" text-anchor="middle" font-size="24" font-weight="780" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">MTP 与 DSA 优化的是 decode 乘法项</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="500" fill="#5b6775" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">MTP 少走步；DSA 少读 KV。两者不是替代关系，而是正交减法。</tspan></text>
  <rect x="60" y="118" width="210" height="84" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="165.0" y="153.28" text-anchor="middle" font-size="15" font-weight="760" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="165.0" dy="-0.00em">普通 decode</tspan></text><text x="165.0" y="176.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="165.0" dy="-0.00em">1 step -&gt; 1 token</tspan></text><path d="M270,160 L390,160" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="330.0" y="152.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="330.0" dy="-0.00em">N_step 次</tspan></text><rect x="390" y="118" width="230" height="84" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="505.0" y="153.28" text-anchor="middle" font-size="15" font-weight="760" fill="#1f2d3d" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="505.0" dy="-0.00em">每一步成本</tspan></text><text x="505.0" y="176.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="505.0" dy="-0.00em">Attention + MoE + comm</tspan></text><path d="M620,160 L750,160" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="685.0" y="152.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="685.0" dy="-0.00em">乘起来</tspan></text><rect x="750" y="118" width="190" height="84" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="845.0" y="153.28" text-anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="845.0" dy="-0.00em">端到端 ITL</tspan></text><text x="845.0" y="176.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="845.0" dy="-0.00em">tokens/sec 的反面</tspan></text><rect x="90" y="280" width="280" height="86" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="230.0" y="316.12" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="230.0" dy="-0.00em">MTP</tspan></text><text x="230.0" y="340.2" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="230.0" dy="-0.00em">让一次 forward 推进更多 token</tspan></text><rect x="620" y="280" width="280" height="86" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="760.0" y="316.12" text-anchor="middle" font-size="15" font-weight="760" fill="#4a3a00" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="760.0" dy="-0.00em">DSA</tspan></text><text x="760.0" y="340.2" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="760.0" dy="-0.00em">让每步只看 top-k KV</tspan></text><path d="M230,280 L505,216" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/><text x="367.5" y="240.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="367.5" dy="-0.00em">N_step ↓</tspan></text><path d="M760,280 L505,216" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/><text x="632.5" y="240.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="632.5" dy="-0.00em">N_kv ↓</tspan></text><rect x="205" y="410" width="590" height="58" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.6"/><text x="500" y="445" text-anchor="middle" font-size="15" font-weight="650" fill="#24292f" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"><tspan x="500" dy="-0.00em">T_decode ≈ N_step · (T_attn(N_kv) + T_moe + T_comm + T_sample)</tspan></text>
</svg>
