<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-label="MTP serving state machine">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { letter-spacing: 0; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="40" text-anchor="middle" font-size="24" font-weight="780" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">MTP serving state machine</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="500" fill="#5b6775" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">按设计材料里的 MTPEaglePhase 重画：phase 和 sequence fields 一起约束 draft/verify/KV。</tspan></text>
  <rect x="70" y="120" width="180" height="74" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="160.0" y="151.07999999999998" text-anchor="middle" font-size="15" font-weight="760" fill="#1f2d3d" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="160.0" dy="-0.00em">PREFILL</tspan></text><text x="160.0" y="171.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="160.0" dy="-0.00em">主模型跑 prompt</tspan></text><path d="M250,157 L360,157" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="305.0" y="149.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="305.0" dy="-0.00em">1 token</tspan></text><rect x="360" y="120" width="210" height="74" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="465.0" y="151.07999999999998" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="465.0" dy="-0.00em">PREFILL_DONE</tspan></text><text x="465.0" y="171.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="465.0" dy="-0.00em">触发 MTP forward</tspan></text><path d="M570,157 L680,157" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="625.0" y="149.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="625.0" dy="-0.00em">1+K draft</tspan></text><rect x="680" y="120" width="180" height="74" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="770.0" y="151.07999999999998" text-anchor="middle" font-size="15" font-weight="760" fill="#4a3a00" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">SCORE</tspan></text><text x="770.0" y="171.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">主模型验证</tspan></text><path d="M770,194 L770,285" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="770.0" y="231.5" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">golden</tspan></text><rect x="620" y="285" width="300" height="88" rx="8" fill="#f7eefb" stroke="#b042b4" stroke-width="2"/><text x="770.0" y="321.96" text-anchor="middle" font-size="15" font-weight="760" fill="#3b1e40" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">VERIFICATION</tspan></text><text x="770.0" y="346.6" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">按 policy 接受连续 draft prefix</tspan></text><path d="M620,329 L420,329" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="520.0" y="321.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="520.0" dy="-0.00em">accepted prefix</tspan></text><rect x="210" y="285" width="210" height="88" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="315.0" y="321.96" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="315.0" dy="-0.00em">KV Commit</tspan></text><text x="315.0" y="346.6" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="315.0" dy="-0.00em">接受则推进 cache_len</tspan></text><path d="M315,285 L315,212" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/><text x="315.0" y="240.5" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="315.0" dy="-0.00em">next round</tspan></text><path d="M770,373 L770,448" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="770.0" y="402.5" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">reject tail</tspan></text><rect x="620" y="448" width="300" height="70" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="770.0" y="477.4" text-anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">KV Rollback</tspan></text><text x="770.0" y="497.0" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="770.0" dy="-0.00em">未接受 token 只从逻辑长度切掉</tspan></text><rect x="72" y="432" width="450" height="42" rx="21.0" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/><text x="297.0" y="458.0" text-anchor="middle" font-size="12" font-weight="700" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="297.0" dy="-0.00em">config: mtp_draft_length=3 / accept_policy</tspan></text><rect x="72" y="488" width="450" height="42" rx="21.0" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/><text x="297.0" y="514.0" text-anchor="middle" font-size="12" font-weight="700" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="297.0" dy="-0.00em">sequence fields: phase, draft_tokens, accepted_count</tspan></text>
</svg>
