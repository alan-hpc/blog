anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="887.5" dy="-0.00em">KV rollback</tspan></text><text x="887.5" y="176.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="887.5" dy="-0.35em">逻辑长度屏蔽</tspan><tspan x="887.5" dy="1.15em">不走 BlockTrie</tspan></text><rect x="70" y="253" width="195" height="84" rx="8" fill="#f7eefb" stroke="#b042b4" stroke-width="2"/><text x="167.5" y="288.28" text-anchor="middle" font-size="15" font-weight="760" fill="#3b1e40" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="167.5" dy="-0.00em">DSA indexer</tspan></text><text x="167.5" y="311.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="167.5" dy="-0.35em">64 index heads</tspan><tspan x="167.5" dy="1.15em">score -&gt; top-k</tspan></text><rect x="310" y="253" width="195" height="84" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="407.5" y="288.28" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="407.5" dy="-0.00em">Sparse MLA</tspan></text><text x="407.5" y="311.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="407.5" dy="-0.35em">indices 编码 page</tspan><tspan x="407.5" dy="1.15em">-1 为 padding</tspan></text><rect x="550" y="253" width="195" height="84" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="647.5" y="288.28" text-anchor="middle" font-size="15" font-weight="760" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="647.5" dy="-0.00em">System boundary</tspan></text><text x="647.5" y="311.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="647.5" dy="-0.35em">Graph bucket</tspan><tspan x="647.5" dy="1.15em">scheduler / sampler</tspan></text><rect x="180" y="405" width="640" height="54" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/><text x="500" y="437" text-anchor="middle" font-size="14" font-weight="760" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500" dy="-0.00em">阅读顺序：先看 decode 成本，再看 MTP step 减法，最后看 DSA KV 减法。</tspan></text>
