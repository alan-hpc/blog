<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="560" viewBox="0 0 1000 560" role="img" aria-label="Verify 与 KV rollback">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { letter-spacing: 0; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="40" text-anchor="middle" font-size="24" font-weight="780" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">Verify 与 KV rollback</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="500" fill="#5b6775" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">资料里的关键边界：prefix cache 只处理 prompt；decode 与 draft 不进 BlockTrie，拒绝后缀只靠逻辑长度屏蔽。</tspan></text>
  <text x="500" y="100" text-anchor="middle" font-size="15" font-weight="700" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500" dy="-0.00em">draft 与 golden 只接受最长连续前缀；后缀 KV 不进入有效上下文</tspan></text><rect x="95" y="170" width="62" height="62" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="126.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#1f2d3d" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="126.0" dy="-0.00em">E</tspan></text><text x="126.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="126.0" dy="-0.00em">main</tspan></text><rect x="185" y="170" width="62" height="62" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="216.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="216.0" dy="-0.00em">F</tspan></text><text x="216.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="216.0" dy="-0.00em">draft</tspan></text><rect x="275" y="170" width="62" height="62" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="306.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="306.0" dy="-0.00em">G</tspan></text><text x="306.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="306.0" dy="-0.00em">draft</tspan></text><rect x="365" y="170" width="62" height="62" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="396.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="396.0" dy="-0.00em">H</tspan></text><text x="396.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="396.0" dy="-0.00em">draft</tspan></text><path d="M460,201 L550,201" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="505.0" y="193.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="505.0" dy="-0.00em">verify</tspan></text><rect x="560" y="170" width="62" height="62" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="591.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="591.0" dy="-0.00em">F</tspan></text><text x="591.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="591.0" dy="-0.00em">gold</tspan></text><rect x="650" y="170" width="62" height="62" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="681.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="681.0" dy="-0.00em">G</tspan></text><text x="681.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="681.0" dy="-0.00em">gold</tspan></text><rect x="740" y="170" width="62" height="62" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="771.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#4a3a00" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="771.0" dy="-0.00em">X</tspan></text><text x="771.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="771.0" dy="-0.00em">gold</tspan></text><rect x="830" y="170" width="62" height="62" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="861.0" y="196.04" text-anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="861.0" dy="-0.00em">Y</tspan></text><text x="861.0" y="213.4" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="861.0" dy="-0.00em">gold</tspan></text><path d="M122,270 L122,330 L692,330 L692,270" fill="none" stroke="#5aa463" stroke-width="2" stroke-dasharray="6 5"/><text x="410" y="356" text-anchor="middle" font-size="14" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="410" dy="-0.00em">accepted: E + F + G + bonus X</tspan></text><path d="M392,270 L392,405 L842,405 L842,270" fill="none" stroke="#c95450" stroke-width="2" stroke-dasharray="6 5"/><text x="620" y="432" text-anchor="middle" font-size="14" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="620" dy="-0.00em">rejected tail: H / Y 不再被 attention 读取</tspan></text><rect x="170" y="465" width="300" height="60" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="320.0" y="490.2" text-anchor="middle" font-size="15" font-weight="760" fill="#4a1c1a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="320.0" dy="-0.00em">逻辑回滚</tspan></text><text x="320.0" y="507.0" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="320.0" dy="-0.00em">cache_len / max_k_len 截断访问范围</tspan></text><rect x="540" y="465" width="300" height="60" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="690.0" y="490.2" text-anchor="middle" font-size="15" font-weight="760" fill="#24292f" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="690.0" dy="-0.00em">物理 buffer</tspan></text><text x="690.0" y="507.0" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="690.0" dy="-0.00em">可保留脏数据，不进 BlockTrie</tspan></text><path d="M470,495 L540,495" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="505.0" y="487.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="505.0" dy="-0.00em">no memset on hot path</tspan></text><rect x="70" y="50" width="210" height="54" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="175.0" y="72.68" text-anchor="middle" font-size="15" font-weight="760" fill="#1f3d24" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="175.0" dy="-0.00em">prompt prefix</tspan></text><text x="175.0" y="87.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="175.0" dy="-0.00em">BlockTrie match/cache</tspan></text><rect x="720" y="50" width="210" height="54" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="825.0" y="72.68" text-anchor="middle" font-size="15" font-weight="760" fill="#4a3a00" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="825.0" dy="-0.00em">decode / draft</tspan></text><text x="825.0" y="87.8" text-anchor="middle" font-size="12" font-weight="520" fill="#526170" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="825.0" dy="-0.00em">seq.tokens / mtp_draft_tokens</tspan></text><path d="M280,77 L720,77" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/><text x="500.0" y="69.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a" font-family="-apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif"><tspan x="500.0" dy="-0.00em">prefill 后分流</tspan></text>
</svg>
