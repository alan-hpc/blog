<svg viewBox="0 0 1000 430" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="430" fill="#ffffff"/>
<text x="500.0" y="40" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="24" font-weight="750" fill="#24292f">Merge up_k：把 K 上投影从历史 cache 挪到当前 query</text>
<text x="500.0" y="66" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="13" font-weight="400" fill="#57606a">The source equations become one reusable decode rule after K-side absorption.</text>
<rect x="95" y="115" width="365" height="125" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="277" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="750" fill="#b85450">before absorption</text>
<text x="277" y="181" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#b85450">QK<tspan font-size="11.6" baseline-shift="super">⊤</tspan> = (hW<tspan font-size="11.6" baseline-shift="sub">q</tspan>)(c<tspan font-size="11.6" baseline-shift="super">KV</tspan>W<tspan font-size="11.6" baseline-shift="sub">u,K</tspan>)<tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<text x="277" y="214" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#b85450">= hW<tspan font-size="11.6" baseline-shift="sub">q</tspan>W<tspan font-size="11.6" baseline-shift="sub">u,K</tspan><tspan font-size="11.6" baseline-shift="super">⊤</tspan>(c<tspan font-size="11.6" baseline-shift="super">KV</tspan>)<tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<rect x="540" y="115" width="365" height="125" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="722" y="148" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="750" fill="#5fa55f">after absorption</text>
<text x="722" y="181" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">W̃<tspan font-size="11.6" baseline-shift="sub">q</tspan> = W<tspan font-size="11.6" baseline-shift="sub">q</tspan>W<tspan font-size="11.6" baseline-shift="sub">u,K</tspan><tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<text x="722" y="214" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">QK<tspan font-size="11.6" baseline-shift="super">⊤</tspan> = (hW̃<tspan font-size="11.6" baseline-shift="sub">q</tspan>)(c<tspan font-size="11.6" baseline-shift="super">KV</tspan>)<tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<line x1="460" y1="178" x2="540" y2="178" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="185" y="318" width="630" height="75" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="1.8"/>
<text x="500" y="349" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="750" fill="#b08900">为什么更快</text>
<text x="500" y="377" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="16" font-weight="600" fill="#24292f">baseline 对每个历史 token 做 W<tspan font-size="10.9" baseline-shift="sub">u,K</tspan>；吸收后只变换当前 query。</text>
</svg>
