<svg viewBox="0 0 1000 380" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="380" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">FlashMLA 放回 V3/R1 decode 系统</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">The kernel is fast because the surrounding system gives it the right tensor shape and scheduling window.</text>
<rect x="70" y="125" width="150" height="75" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="145" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">MLA math</text>
<text x="145" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#57606a">absorb Wkv,b</text>
<line x1="220" y1="162" x2="260" y2="162" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="260" y="125" width="150" height="75" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="335" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">KV cache</text>
<text x="335" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#57606a">latent + pages</text>
<line x1="410" y1="162" x2="450" y2="162" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="450" y="125" width="150" height="75" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="525" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">FlashMLA</text>
<text x="525" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#57606a">seesaw + tiles</text>
<line x1="600" y1="162" x2="640" y2="162" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="640" y="125" width="150" height="75" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="2"/>
<text x="715" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">CUDA Graph</text>
<text x="715" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#57606a">fixed shape</text>
<line x1="790" y1="162" x2="830" y2="162" stroke="#24292f" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="830" y="125" width="150" height="75" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="905" y="153" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#24292f">DBO</text>
<text x="905" y="178" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="500" fill="#57606a">hide slot</text>
<rect x="135" y="270" width="730" height="62" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
<text x="500" y="295" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#24292f">FlashMLA 不是孤立 kernel。</text>
<text x="500" y="318" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="500" fill="#57606a">数学吸收、KV layout、scheduler metadata、Graph 与 DBO 任一环错位，端到端收益都会缩水。</text>
</svg>
