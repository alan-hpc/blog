<svg viewBox="0 0 1000 410" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="410" fill="#ffffff"/>
<text x="500" y="38" text-anchor="middle" font-family="sans-serif" font-size="24" font-weight="700" fill="#24292f">Dense / Sparse FlashMLA 的接口边界</text>
<text x="500" y="64" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="400" fill="#57606a">The modern repo supports both V3/R1 dense decode and V3.2-style sparse decode.</text>
<rect x="70" y="95" width="390" height="95" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="265" y="123" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#24292f">Dense decoding</text>
<text x="265" y="148" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#57606a">SM90 · MQA · BF16 KV</text>
<text x="265" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#24292f">indices = None</text>
<rect x="540" y="95" width="390" height="95" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="735" y="123" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="700" fill="#24292f">Sparse decoding</text>
<text x="735" y="148" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#57606a">SM90 / SM100 · MQA · FP8 KV</text>
<text x="735" y="170" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#24292f">indices: (B, S_q, topk)</text>
<rect x="120" y="240" width="320" height="60" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/>
<text x="280" y="265" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#24292f">FP8 KV = 512B NoPE + 16B scale + 128B RoPE</text>
<rect x="560" y="235" width="330" height="72" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="725" y="262" text-anchor="middle" font-family="serif" font-size="15" font-weight="600" fill="#e0b300">idx = page(t) · B_page + offset(t)</text>
<text x="725" y="286" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#57606a">invalid entries = -1</text>
<line x1="460" y1="142" x2="540" y2="142" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
<rect x="210" y="345" width="580" height="42" rx="8" fill="#fbf0fb" stroke="#a33ea1" stroke-width="1.5"/>
<text x="500" y="371" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#a33ea1">共同目标：让 attention 少读 KV，或者以更适合 kernel 的方式读 KV。</text>
</svg>
