<rect x="0" y="0" width="1000" height="610" fill="#ffffff"/>
<text x="500.0" y="40" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="24" font-weight="750" fill="#24292f">吸收后的 MLA decode：latent cache 成为 attention operand</text>
<text x="500.0" y="66" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="13" font-weight="400" fill="#57606a">After K/V absorption, decode attention sees c^KV directly; full K and V are no longer materialized.</text>
