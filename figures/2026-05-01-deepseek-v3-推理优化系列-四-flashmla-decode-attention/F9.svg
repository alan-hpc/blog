<text x="290" y="462" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">W̃<tspan font-size="11.6" baseline-shift="sub">q</tspan> = W<tspan font-size="11.6" baseline-shift="sub">q</tspan>W<tspan font-size="11.6" baseline-shift="sub">u,K</tspan><tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
