<text x="400" y="247" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">c<tspan font-size="11.6" baseline-shift="super">KV</tspan> = hW<tspan font-size="11.6" baseline-shift="sub">d,KV</tspan></text>
<text x="400" y="272" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="12" font-weight="500" fill="#57606a">latent cache</text>
