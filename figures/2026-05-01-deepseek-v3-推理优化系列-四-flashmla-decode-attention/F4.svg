<text x="500" y="584" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="15" font-weight="750" fill="#b85450">decode 热路径的浪费</text>
<text x="500" y="615" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="16" font-weight="600" fill="#b85450">每步都对历史 c<tspan font-size="10.9" baseline-shift="super">KV</tspan> 恢复 K 和 V，额外 GEMM 与中间张量会反复出现。</text>
