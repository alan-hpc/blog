<svg viewBox="0 0 1000 690" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" fill="#24292f"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="690" fill="#ffffff"/>
<text x="500.0" y="40" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="24" font-weight="750" fill="#24292f">普通 Attention：先展开两条可吸收的矩阵链</text>
<text x="500.0" y="66" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="13" font-weight="400" fill="#57606a">The math stays identical; MLA only moves linear maps across the score and output sides.</text>
<rect x="82" y="96" width="836" height="74" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="1.5"/>
<text x="500" y="126" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="20" font-weight="600" fill="#24292f">Q = hW<tspan font-size="13.6" baseline-shift="sub">q</tspan>,   K = hW<tspan font-size="13.6" baseline-shift="sub">k</tspan>,   V = hW<tspan font-size="13.6" baseline-shift="sub">v</tspan>,   P = softmax(QK<tspan font-size="13.6" baseline-shift="super">⊤</tspan>)</text>
<text x="500" y="154" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="20" font-weight="600" fill="#24292f">Y = PVW<tspan font-size="13.6" baseline-shift="sub">o</tspan></text>
<rect x="100" y="210" width="170" height="70" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="185" y="240" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="700" fill="#24292f">hidden state</text>
<text x="185" y="263" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="18" font-weight="600" fill="#4a6fd3">h</text>
<rect x="350" y="185" width="180" height="56" rx="8" fill="#eef7ff" stroke="#4a6fd3" stroke-width="2"/>
<text x="440" y="219" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#4a6fd3">Q = hW<tspan font-size="11.6" baseline-shift="sub">q</tspan></text>
<rect x="350" y="260" width="180" height="56" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="440" y="294" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">K = hW<tspan font-size="11.6" baseline-shift="sub">k</tspan></text>
<rect x="350" y="335" width="180" height="56" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="440" y="369" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">V = hW<tspan font-size="11.6" baseline-shift="sub">v</tspan></text>
<ellipse cx="660" cy="250" rx="72" ry="38" fill="#fbf0fb" stroke="#a33ea1" stroke-width="1.5"/>
<text x="660" y="257" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="15" font-weight="600" fill="#a33ea1">P = softmax(QK<tspan font-size="10.2" baseline-shift="super">⊤</tspan>)</text>
<rect x="780" y="315" width="150" height="58" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="2"/>
<text x="855" y="350" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#b08900">Y = PVW<tspan font-size="11.6" baseline-shift="sub">o</tspan></text>
<line x1="270" y1="245" x2="350" y2="213" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="270" y1="245" x2="350" y2="288" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="270" y1="245" x2="350" y2="363" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="530" y1="213" x2="600" y2="238" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="530" y1="288" x2="600" y2="263" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="732" y1="250" x2="780" y2="335" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<line x1="530" y1="363" x2="780" y2="350" stroke="#57606a" stroke-width="1.8" marker-end="url(#arrow)"/>
<rect x="95" y="455" width="360" height="112" rx="8" fill="#fff5f0" stroke="#b85450" stroke-width="2"/>
<text x="275" y="482" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="700" fill="#b85450">score side</text>
<text x="275" y="518" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#b85450">QK<tspan font-size="11.6" baseline-shift="super">⊤</tspan> = (hW<tspan font-size="11.6" baseline-shift="sub">q</tspan>)(hW<tspan font-size="11.6" baseline-shift="sub">k</tspan>)<tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<text x="275" y="548" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#b85450">= hW<tspan font-size="11.6" baseline-shift="sub">q</tspan>W<tspan font-size="11.6" baseline-shift="sub">k</tspan><tspan font-size="11.6" baseline-shift="super">⊤</tspan>h<tspan font-size="11.6" baseline-shift="super">⊤</tspan></text>
<rect x="545" y="455" width="360" height="112" rx="8" fill="#f4faf4" stroke="#5fa55f" stroke-width="2"/>
<text x="725" y="482" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="14" font-weight="700" fill="#5fa55f">output side</text>
<text x="725" y="518" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">Y = (PV)W<tspan font-size="11.6" baseline-shift="sub">o</tspan></text>
<text x="725" y="548" text-anchor="middle" font-family="&#x27;STIX Two Math&#x27;, &#x27;Cambria Math&#x27;, &#x27;Times New Roman&#x27;, serif" font-size="17" font-weight="600" fill="#5fa55f">= PhW<tspan font-size="11.6" baseline-shift="sub">v</tspan>W<tspan font-size="11.6" baseline-shift="sub">o</tspan></text>
<rect x="230" y="610" width="540" height="52" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="1.5"/>
<text x="500" y="640" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="13" font-weight="700" fill="#24292f">后续只移动矩阵乘法的位置，不改变 attention 的数学语义。</text>
</svg>
