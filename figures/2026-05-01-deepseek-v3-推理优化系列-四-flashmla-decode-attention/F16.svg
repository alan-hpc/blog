<text x="500.0" y="66" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="13" font-weight="400" fill="#57606a">The resource table explains why FlashMLA is designed as a one-block-per-SM persistent kernel.</text>
