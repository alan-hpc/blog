<text x="530" y="440" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="15" font-weight="750" fill="#b85450">total ≈ 225 KB</text>
<text x="855" y="440" text-anchor="end" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="12" font-weight="750" fill="#24292f">H100 limit 227 KB</text>
<rect x="170" y="492" width="660" height="54" rx="8" fill="#fff8e7" stroke="#e0b300" stroke-width="1.5"/>
<text x="500" y="516" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="12" font-weight="750" fill="#b08900">这解释了为什么 block 直接接管一个 SM：SHM 已接近上限，调度空间主要在 tile/warp-group 内。</text>
<text x="500" y="537" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="11" font-weight="500" fill="#57606a">如果再加一份大 buffer，很容易把 occupancy 或 pipeline 推到不可用边界。</text>
