<text x="735" y="324" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="11" font-weight="600" fill="#57606a">((_2,_2),_128,_1,_8)</text>
