<text x="735" y="220" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="11" font-weight="600" fill="#57606a">((_8,_8),(_64,_9))</text>
<text x="735" y="238" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, &#x27;Segoe UI&#x27;, sans-serif" font-size="11" font-weight="600" fill="#57606a">FP16</text>
