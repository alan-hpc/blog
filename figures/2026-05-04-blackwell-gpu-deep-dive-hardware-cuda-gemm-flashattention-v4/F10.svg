<svg viewBox='0 0 1020 540' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Warp Specialization 流水：从 Hopper 二分到 Blackwell 多角色</text>
<!-- TOP: Hopper -->
<text x='30' y='65' font-size='13' font-weight='700' fill='#b85450'>BEFORE · Hopper</text>
<text x='30' y='82' font-size='11' fill='#666'>线性二分：TMA producer ↔ Tensor Core consumer</text>
<rect x='30' y='100' width='180' height='50' fill='#4a6fd3' opacity='0.20' stroke='#4a6fd3'/>
<text x='120' y='125' font-size='12' text-anchor='middle' font-weight='700' fill='#4a6fd3'>TMA warp</text>
<text x='120' y='142' font-size='10.5' text-anchor='middle' fill='#1a3055'>producer</text>
<rect x='270' y='100' width='180' height='50' fill='#fff' stroke='#888'/>
<text x='360' y='125' font-size='12' text-anchor='middle' fill='#222'>SMEM</text>
<rect x='510' y='100' width='200' height='50' fill='#e0b300' opacity='0.20' stroke='#e0b300'/>
<text x='610' y='125' font-size='12' text-anchor='middle' font-weight='700' fill='#e0b300'>wgmma warpgroup</text>
<text x='610' y='142' font-size='10.5' text-anchor='middle' fill='#7a4500'>consumer</text>
<rect x='770' y='100' width='180' height='50' fill='#fff' stroke='#888'/>
<text x='860' y='125' font-size='12' text-anchor='middle' fill='#222'>RF (累加器)</text>
<line x1='210' y1='125' x2='270' y2='125' stroke='#888' marker-end='url(#ar)'/>
<line x1='450' y1='125' x2='510' y2='125' stroke='#888' marker-end='url(#ar)'/>
<line x1='710' y1='125' x2='770' y2='125' stroke='#888' marker-end='url(#ar)'/>
<text x='270' y='178' font-size='10.5' fill='#888' text-anchor='middle' font-style='italic'>full mbar</text>
<text x='510' y='178' font-size='10.5' fill='#888' text-anchor='middle' font-style='italic'>empty mbar</text>
<rect x='30' y='195' width='920' height='30' fill='#fee' stroke='#b85450'/>
<text x='490' y='215' font-size='11.5' text-anchor='middle' fill='#5a1a1a'>问题：Tensor Core 一旦把累加器写入 RF，<tspan font-weight='700'>必须同 warpgroup 完成 epilogue</tspan>，warp 角色被钉死</text>
<line x1='510' y1='250' x2='510' y2='280' stroke='#666' stroke-width='2' marker-end='url(#ar)'/>
<!-- BOTTOM: Blackwell -->
<text x='30' y='305' font-size='13' font-weight='700' fill='#5fa55f'>AFTER · Blackwell</text>
<text x='30' y='322' font-size='11' fill='#666'>多角色多生产-多消费：所有 warp 同时戴两顶帽子</text>
<rect x='30' y='340' width='130' height='50' fill='#ddd' stroke='#888'/>
<text x='95' y='365' font-size='11' text-anchor='middle' fill='#222'>Sched warp</text>
<text x='95' y='380' font-size='9.5' text-anchor='middle' fill='#666'>tile metadata</text>
<rect x='180' y='340' width='130' height='50' fill='#4a6fd3' opacity='0.20' stroke='#4a6fd3'/>
<text x='245' y='365' font-size='11' text-anchor='middle' font-weight='700' fill='#4a6fd3'>TMA warp(s)</text>
<text x='245' y='380' font-size='9.5' text-anchor='middle' fill='#1a3055'>GMEM→SMEM</text>
<rect x='330' y='340' width='130' height='50' fill='#5fa55f' opacity='0.20' stroke='#5fa55f'/>
<text x='395' y='362' font-size='11' text-anchor='middle' font-weight='700' fill='#5fa55f'>MMA dispatcher</text>
<text x='395' y='378' font-size='9.5' text-anchor='middle' fill='#1a5a1a'>1 thread, tcgen05.mma</text>
<rect x='480' y='340' width='130' height='50' fill='#fff' stroke='#888'/>
<text x='545' y='365' font-size='11' text-anchor='middle' fill='#222'>TMEM</text>
<text x='545' y='380' font-size='9.5' text-anchor='middle' fill='#666'>(累加器)</text>
<rect x='630' y='340' width='130' height='50' fill='#a33ea1' opacity='0.20' stroke='#a33ea1'/>
<text x='695' y='365' font-size='11' text-anchor='middle' font-weight='700' fill='#a33ea1'>Epilogue WG</text>
<text x='695' y='380' font-size='9.5' text-anchor='middle' fill='#4a1a48'>tcgen05.ld + 后处理</text>
<rect x='780' y='340' width='130' height='50' fill='#b85450' opacity='0.20' stroke='#b85450'/>
<text x='845' y='365' font-size='11' text-anchor='middle' font-weight='700' fill='#b85450'>Store warp</text>
<text x='845' y='380' font-size='9.5' text-anchor='middle' fill='#5a1a1a'>TMA store→GMEM</text>
<line x1='160' y1='365' x2='180' y2='365' stroke='#888' marker-end='url(#ar)'/>
<line x1='310' y1='365' x2='330' y2='365' stroke='#888' marker-end='url(#ar)'/>
<line x1='460' y1='365' x2='480' y2='365' stroke='#5fa55f' marker-end='url(#arG)'/>
<line x1='610' y1='365' x2='630' y2='365' stroke='#888' marker-end='url(#ar)'/>
<line x1='760' y1='365' x2='780' y2='365' stroke='#888' marker-end='url(#ar)'/>
<!-- mbarrier connectors -->
<text x='245' y='415' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>tma_mbar</text>
<text x='395' y='415' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>—</text>
<text x='545' y='415' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>mma_mbar</text>
<text x='695' y='415' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>—</text>
<text x='845' y='415' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>store_mbar</text>
<rect x='30' y='435' width='920' height='90' fill='#efe' stroke='#5fa55f'/>
<text x='490' y='458' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>关键变化：累加器在 TMEM → MMA dispatcher 写完即可解放，Epilogue WG 是另一组 warp</text>
<text x='490' y='478' font-size='11' text-anchor='middle' fill='#1a5a1a'>每条箭头都是一个独立 mbarrier。Tensor Core 既是 SMEM 的 consumer、又是 TMEM 的 producer。</text>
<text x='490' y='497' font-size='11' text-anchor='middle' fill='#1a5a1a'>FA4 在此基础上还能塞进 softmax warpgroup × 2 + correction warp，10+ 角色共存于一个 SM。</text>
<text x='490' y='516' font-size='10.5' text-anchor='middle' fill='#5a1a1a' font-style='italic'>——这正是“全 warp 都是 producer &amp; consumer”的硬件根源。</text>
</svg>
