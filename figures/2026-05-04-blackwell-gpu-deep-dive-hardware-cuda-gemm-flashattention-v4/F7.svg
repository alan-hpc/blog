<svg viewBox='0 0 1020 460' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>对比：Hopper wgmma vs Blackwell tcgen05.mma 的发射与累加器路径</text>
<!-- BEFORE: Hopper -->
<rect x='15' y='50' width='480' height='390' fill='#fff5f0' stroke='#b85450' stroke-width='2' rx='6'/>
<text x='30' y='75' font-size='13' font-weight='700' fill='#b85450'>BEFORE · Hopper wgmma</text>
<rect x='40' y='95' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='255' y='120' font-size='12' text-anchor='middle' fill='#222'>① warpgroup 4 个 warp 同时活着 (128 thread)</text>
<rect x='40' y='145' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='255' y='170' font-size='12' text-anchor='middle' fill='#222'>② SMEM (A/B) → wgmma → <tspan font-weight='700'>RF (累加器)</tspan></text>
<rect x='40' y='195' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='255' y='220' font-size='12' text-anchor='middle' fill='#222'>③ wgmma.fence + commit_group + wait_group (3 段同步)</text>
<rect x='40' y='245' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='255' y='270' font-size='12' text-anchor='middle' fill='#222'>④ Epilogue 必须由<tspan font-weight='700'>同 warpgroup</tspan>处理 RF 累加器</text>
<rect x='40' y='305' width='430' height='110' fill='#fee' stroke='#b85450' stroke-width='1.5'/>
<text x='255' y='325' font-size='12' text-anchor='middle' font-weight='700' fill='#5a1a1a'>三大代价</text>
<text x='255' y='345' font-size='11' text-anchor='middle' fill='#5a1a1a'>· 累加器占 64–256 reg/thread → occupancy 受限</text>
<text x='255' y='362' font-size='11' text-anchor='middle' fill='#5a1a1a'>· warpgroup 必须存活到最后 epilogue 写出</text>
<text x='255' y='379' font-size='11' text-anchor='middle' fill='#5a1a1a'>· 任一 warp 没准备好都卡住整个 warpgroup</text>
<text x='255' y='402' font-size='11' text-anchor='middle' fill='#5a1a1a' font-style='italic'>实测延迟与 N 强相关：32/64/128 cyc</text>
<!-- AFTER: Blackwell -->
<rect x='525' y='50' width='480' height='390' fill='#f4faf4' stroke='#5fa55f' stroke-width='2' rx='6'/>
<text x='540' y='75' font-size='13' font-weight='700' fill='#5fa55f'>AFTER · Blackwell tcgen05.mma</text>
<rect x='550' y='95' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='765' y='120' font-size='12' text-anchor='middle' fill='#222'>① <tspan font-weight='700'>1 个线程</tspan>发射（其它 31 thread 完全自由）</text>
<rect x='550' y='145' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='765' y='170' font-size='12' text-anchor='middle' fill='#222'>② SMEM 或 TMEM (A/B) → tcgen05.mma → <tspan font-weight='700'>TMEM</tspan></text>
<rect x='550' y='195' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='765' y='220' font-size='12' text-anchor='middle' fill='#222'>③ umma_arrive(mbar) <tspan font-weight='700'>一条指令</tspan>，硬件自动跟踪</text>
<rect x='550' y='245' width='430' height='40' fill='#fff' stroke='#888'/>
<text x='765' y='270' font-size='12' text-anchor='middle' fill='#222'>④ Epilogue 由<tspan font-weight='700'>另一组 warp</tspan>读 TMEM，完全解耦</text>
<rect x='550' y='305' width='430' height='110' fill='#efe' stroke='#5fa55f' stroke-width='1.5'/>
<text x='765' y='325' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>三大收益</text>
<text x='765' y='345' font-size='11' text-anchor='middle' fill='#1a5a1a'>· RF 不再被累加器占用 → occupancy 翻倍</text>
<text x='765' y='362' font-size='11' text-anchor='middle' fill='#1a5a1a'>· MMA dispatcher 与 epilogue warp 完全解耦</text>
<text x='765' y='379' font-size='11' text-anchor='middle' fill='#1a5a1a'>· 单条指令延迟与 N 几乎无关：恒为 11 cyc</text>
<text x='765' y='402' font-size='11' text-anchor='middle' fill='#1a5a1a' font-style='italic'>论文实测 m64n64k16~m256n256k16 都 ≈ 11.0 cyc</text>
</svg>
