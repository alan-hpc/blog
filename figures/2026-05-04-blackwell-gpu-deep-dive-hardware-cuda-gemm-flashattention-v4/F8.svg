<svg viewBox='0 0 1020 470' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='30' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>tcgen05 指令家族数据流：alloc → cp → mma → ld → store → dealloc</text>
<rect x='80' y='80' width='180' height='58' rx='4' fill='#e0b300' opacity='0.15' stroke='#e0b300' stroke-width='1.5'/>
<text x='170' y='98' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#e0b300'>tcgen05.alloc</text>
<text x='170' y='116' font-size='10.5' text-anchor='middle' fill='#444'>申请 TMEM 列</text><text x='170' y='129' font-size='10.5' text-anchor='middle' fill='#444'>(写 base addr 到 SMEM)</text>
<rect x='80' y='200' width='180' height='58' rx='4' fill='#4a6fd3' opacity='0.15' stroke='#4a6fd3' stroke-width='1.5'/>
<text x='170' y='218' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#4a6fd3'>TMA / cp.async</text>
<text x='170' y='236' font-size='10.5' text-anchor='middle' fill='#444'>GMEM → SMEM</text><text x='170' y='249' font-size='10.5' text-anchor='middle' fill='#444'>操作数加载</text>
<rect x='330' y='200' width='180' height='58' rx='4' fill='#4a6fd3' opacity='0.15' stroke='#4a6fd3' stroke-width='1.5'/>
<text x='420' y='218' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#4a6fd3'>tcgen05.cp</text>
<text x='420' y='236' font-size='10.5' text-anchor='middle' fill='#444'>SMEM → TMEM</text><text x='420' y='249' font-size='10.5' text-anchor='middle' fill='#444'>按 32×128b 块异步拷贝</text>
<rect x='580' y='140' width='180' height='72' rx='4' fill='#5fa55f' opacity='0.15' stroke='#5fa55f' stroke-width='1.5'/>
<text x='670' y='158' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#5fa55f'>tcgen05.mma</text>
<text x='670' y='176' font-size='10.5' text-anchor='middle' fill='#444'>单线程发射</text><text x='670' y='189' font-size='10.5' text-anchor='middle' fill='#444'>A(SMEM/TMEM) × B(SMEM)</text><text x='670' y='202' font-size='10.5' text-anchor='middle' fill='#444'>→ acc(TMEM)</text>
<rect x='580' y='270' width='180' height='58' rx='4' fill='#e0b300' opacity='0.15' stroke='#e0b300' stroke-width='1.5'/>
<text x='670' y='288' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#e0b300'>umma_arrive</text>
<text x='670' y='306' font-size='10.5' text-anchor='middle' fill='#444'>完成事件挂 mbarrier</text><text x='670' y='319' font-size='10.5' text-anchor='middle' fill='#444'>(自动 fence)</text>
<rect x='830' y='140' width='180' height='58' rx='4' fill='#a33ea1' opacity='0.15' stroke='#a33ea1' stroke-width='1.5'/>
<text x='920' y='158' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#a33ea1'>tcgen05.ld</text>
<text x='920' y='176' font-size='10.5' text-anchor='middle' fill='#444'>TMEM → RF</text><text x='920' y='189' font-size='10.5' text-anchor='middle' fill='#444'>(warp-sync, 32 lanes)</text>
<rect x='830' y='270' width='180' height='58' rx='4' fill='#b85450' opacity='0.15' stroke='#b85450' stroke-width='1.5'/>
<text x='920' y='288' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#b85450'>Epilogue + store</text>
<text x='920' y='306' font-size='10.5' text-anchor='middle' fill='#444'>后处理 + TMA store</text><text x='920' y='319' font-size='10.5' text-anchor='middle' fill='#444'>→ GMEM</text>
<rect x='80' y='360' width='180' height='58' rx='4' fill='#e0b300' opacity='0.15' stroke='#e0b300' stroke-width='1.5'/>
<text x='170' y='378' font-size='12' text-anchor='middle' font-weight='700' font-family='monospace' fill='#e0b300'>tcgen05.dealloc</text>
<text x='170' y='396' font-size='10.5' text-anchor='middle' fill='#444'>释放 TMEM</text><text x='170' y='409' font-size='10.5' text-anchor='middle' fill='#444'>(必须同 warp)</text>
<line x1='170' y1='130' x2='170' y2='200' stroke='#999' stroke-width='1.5' marker-end='url(#ar)'/>
<line x1='260' y1='225' x2='330' y2='225' stroke='#4a6fd3' stroke-width='1.8' marker-end='url(#arB)'/>
<line x1='510' y1='225' x2='580' y2='180' stroke='#5fa55f' stroke-width='1.8' marker-end='url(#arG)'/>
<line x1='670' y1='225' x2='670' y2='270' stroke='#999' stroke-width='1.5' marker-end='url(#ar)'/>
<line x1='760' y1='180' x2='830' y2='180' stroke='#5fa55f' stroke-width='1.8' marker-end='url(#arG)'/>
<line x1='920' y1='225' x2='920' y2='270' stroke='#b85450' stroke-width='1.8' marker-end='url(#arR)'/>
<line x1='170' y1='420' x2='170' y2='450' stroke='#aaa' stroke-width='1' stroke-dasharray='3 2'/>
<text x='200' y='445' font-size='10.5' fill='#777' font-style='italic'>kernel 退出前</text>
<rect x='80' y='430' width='180' height='30' fill='#fffbe7' stroke='#e0b300'/>
<text x='170' y='450' font-size='11' text-anchor='middle' fill='#7a5500'>所有箭头都靠 mbarrier 串联</text>
</svg>
