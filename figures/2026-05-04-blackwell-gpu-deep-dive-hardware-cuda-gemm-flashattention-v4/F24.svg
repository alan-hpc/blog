<svg viewBox='0 0 1020 320' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Hopper：Persistent Kernel + Warp Specialization 把 prolog/epilog 藏起来</text>
<!-- Before -->
<text x='40' y='75' font-size='12' font-weight='700' fill='#b85450'>BEFORE · Block-per-tile</text>
<rect x='180' y='60' width='40' height='28' fill='#aaa'/>
<text x='200' y='79' font-size='9' text-anchor='middle' fill='#fff'>prolog</text>
<rect x='220' y='60' width='100' height='28' fill='#5fa55f' opacity='0.6'/>
<text x='270' y='79' font-size='10' text-anchor='middle' fill='#fff'>compute</text>
<rect x='320' y='60' width='40' height='28' fill='#aaa'/>
<text x='340' y='79' font-size='9' text-anchor='middle' fill='#fff'>epilog</text>
<rect x='370' y='60' width='40' height='28' fill='#aaa'/>
<text x='390' y='79' font-size='9' text-anchor='middle' fill='#fff'>prolog</text>
<rect x='410' y='60' width='100' height='28' fill='#5fa55f' opacity='0.6'/>
<text x='460' y='79' font-size='10' text-anchor='middle' fill='#fff'>compute</text>
<rect x='510' y='60' width='40' height='28' fill='#aaa'/>
<text x='530' y='79' font-size='9' text-anchor='middle' fill='#fff'>epilog</text>
<rect x='560' y='60' width='40' height='28' fill='#aaa'/>
<text x='580' y='79' font-size='9' text-anchor='middle' fill='#fff'>prolog</text>
<rect x='600' y='60' width='100' height='28' fill='#5fa55f' opacity='0.6'/>
<text x='650' y='79' font-size='10' text-anchor='middle' fill='#fff'>compute</text>
<rect x='700' y='60' width='40' height='28' fill='#aaa'/>
<text x='720' y='79' font-size='9' text-anchor='middle' fill='#fff'>epilog</text>
<text x='760' y='80' font-size='11' fill='#b85450'>每个 block 都有 prolog/epilog</text>
<!-- After -->
<text x='40' y='160' font-size='12' font-weight='700' fill='#5fa55f'>AFTER · Persistent + Warp Specialization</text>
<rect x='180' y='110' width='40' height='28' fill='#aaa'/>
<text x='200' y='129' font-size='9' text-anchor='middle' fill='#fff'>prolog</text>
<rect x='220' y='110' width='420' height='28' fill='#5fa55f' opacity='0.6'/>
<text x='430' y='129' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>持续 compute 多个 tile，prolog 仅一次</text>
<rect x='640' y='110' width='40' height='28' fill='#aaa'/>
<text x='660' y='129' font-size='9' text-anchor='middle' fill='#fff'>epilog</text>
<!-- producer/consumer ping-pong -->
<text x='40' y='190' font-size='11' fill='#222'>warp 0 (TMA producer)</text>
<rect x='220' y='180' width='100' height='20' fill='#4a6fd3' opacity='0.55'/>
<rect x='330' y='180' width='100' height='20' fill='#4a6fd3' opacity='0.55'/>
<rect x='440' y='180' width='100' height='20' fill='#4a6fd3' opacity='0.55'/>
<rect x='550' y='180' width='100' height='20' fill='#4a6fd3' opacity='0.55'/>
<text x='270' y='195' font-size='9' text-anchor='middle' fill='#fff'>load 0</text>
<text x='380' y='195' font-size='9' text-anchor='middle' fill='#fff'>load 1</text>
<text x='490' y='195' font-size='9' text-anchor='middle' fill='#fff'>load 2</text>
<text x='600' y='195' font-size='9' text-anchor='middle' fill='#fff'>load 3</text>
<text x='40' y='220' font-size='11' fill='#222'>warpgroup A (wgmma)</text>
<rect x='330' y='210' width='100' height='20' fill='#e0b300' opacity='0.6'/>
<text x='380' y='225' font-size='9' text-anchor='middle' fill='#fff'>wgmma 0</text>
<rect x='550' y='210' width='100' height='20' fill='#e0b300' opacity='0.6'/>
<text x='600' y='225' font-size='9' text-anchor='middle' fill='#fff'>wgmma 2</text>
<text x='40' y='250' font-size='11' fill='#222'>warpgroup B (wgmma)</text>
<rect x='440' y='240' width='100' height='20' fill='#a33ea1' opacity='0.6'/>
<text x='490' y='255' font-size='9' text-anchor='middle' fill='#fff'>wgmma 1</text>
<rect x='660' y='240' width='100' height='20' fill='#a33ea1' opacity='0.6'/>
<text x='710' y='255' font-size='9' text-anchor='middle' fill='#fff'>wgmma 3</text>
<rect x='40' y='275' width='960' height='35' fill='#efe' stroke='#5fa55f'/>
<text x='520' y='297' font-size='11' text-anchor='middle' fill='#1a5a1a'>这就是 DeepGEMM / FA3 上的 ping-pong：两个 warpgroup 交替算 → Tensor Core 永远忙</text>
</svg>
