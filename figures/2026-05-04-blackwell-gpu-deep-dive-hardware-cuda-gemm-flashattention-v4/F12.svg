<!-- long tail marker -->
<rect x='198' y='158' width='40' height='24' fill='none' stroke='#b85450' stroke-width='2' stroke-dasharray='3 2'/>
<text x='260' y='173' font-size='10.5' fill='#b85450' font-weight='700'>← 长尾</text>
<!-- annotations -->
<rect x='80' y='250' width='420' height='90' fill='#fee' stroke='#b85450' rx='4'/>
<text x='290' y='272' font-size='12' text-anchor='middle' font-weight='700' fill='#5a1a1a'>问题</text>
<text x='290' y='292' font-size='11' text-anchor='middle' fill='#5a1a1a'>output tile 在 launch 时静态 map 到 SM</text>
<text x='290' y='309' font-size='11' text-anchor='middle' fill='#5a1a1a'>若 SM4 被其它 kernel 抢占 → tile 不会迁移</text>
<text x='290' y='326' font-size='11' text-anchor='middle' fill='#5a1a1a'>整个 grid 被最慢的 SM 拖累</text>
<rect x='560' y='250' width='420' height='90' fill='#efe' stroke='#5fa55f' rx='4'/>
<text x='770' y='272' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>How it works</text>
<text x='770' y='292' font-size='11' text-anchor='middle' fill='#1a5a1a'>Cluster Launch Control 维护 tile work-queue</text>
<text x='770' y='309' font-size='11' text-anchor='middle' fill='#1a5a1a'>SM 完成当前 tile → 硬件 atomic 取下一个</text>
<text x='770' y='326' font-size='11' text-anchor='middle' fill='#1a5a1a'>负载自动均衡，CUTLASS 在 Blackwell 默认开启</text>
