<svg viewBox='0 0 1020 480' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>mbarrier 状态机：arrival count + tx-count + phase bit 三件事原子组合</text>
<!-- 3 fields -->
<rect x='40' y='65' width='300' height='90' fill='#4a6fd3' opacity='0.13' stroke='#4a6fd3' stroke-width='1.8' rx='4'/>
<text x='190' y='88' font-size='13' text-anchor='middle' font-weight='700' fill='#4a6fd3'>① arrival count</text>
<text x='190' y='112' font-size='11.5' text-anchor='middle' fill='#222'>期望 N 个 thread arrive</text>
<text x='190' y='130' font-size='11' text-anchor='middle' fill='#444'>每个 wgmma/tcgen05 完成自动 +1</text>
<text x='190' y='148' font-size='10.5' text-anchor='middle' fill='#666' font-style='italic'>计数器</text>
<rect x='360' y='65' width='300' height='90' fill='#5fa55f' opacity='0.13' stroke='#5fa55f' stroke-width='1.8' rx='4'/>
<text x='510' y='88' font-size='13' text-anchor='middle' font-weight='700' fill='#5fa55f'>② tx-count (transaction bytes)</text>
<text x='510' y='112' font-size='11.5' text-anchor='middle' fill='#222'>期望 N 字节传输完成</text>
<text x='510' y='130' font-size='11' text-anchor='middle' fill='#444'>TMA / tcgen05.cp 自动累加</text>
<text x='510' y='148' font-size='10.5' text-anchor='middle' fill='#666' font-style='italic'>专为异步 DMA 设计</text>
<rect x='680' y='65' width='300' height='90' fill='#e0b300' opacity='0.15' stroke='#e0b300' stroke-width='1.8' rx='4'/>
<text x='830' y='88' font-size='13' text-anchor='middle' font-weight='700' fill='#e0b300'>③ phase bit (0/1)</text>
<text x='830' y='112' font-size='11.5' text-anchor='middle' fill='#222'>两 count 都满足 → 翻转</text>
<text x='830' y='130' font-size='11' text-anchor='middle' fill='#444'>等待方比较 phase 决定是否 block</text>
<text x='830' y='148' font-size='10.5' text-anchor='middle' fill='#666' font-style='italic'>解决 ABA 问题</text>
<!-- timeline -->
<text x='40' y='190' font-size='13' font-weight='700' fill='#1f2328'>时序示意：TMA producer 与 MMA consumer 一轮交互</text>
<line x1='80' y1='220' x2='960' y2='220' stroke='#333' stroke-width='1.5'/>
<line x1='80' y1='320' x2='960' y2='320' stroke='#333' stroke-width='1.5'/>
<text x='40' y='225' font-size='11' fill='#222' font-weight='700'>Producer</text>
<text x='40' y='325' font-size='11' fill='#222' font-weight='700'>Consumer</text>
<!-- producer events -->
<rect x='100' y='205' width='130' height='30' fill='#4a6fd3' opacity='0.30'/>
<text x='165' y='225' font-size='10.5' text-anchor='middle' fill='#1a3055'>cp.async.bulk</text>
<text x='165' y='248' font-size='9.5' text-anchor='middle' fill='#666'>tx_count: 0→16KB</text>
<rect x='250' y='205' width='130' height='30' fill='#4a6fd3' opacity='0.50'/>
<text x='315' y='225' font-size='10.5' text-anchor='middle' fill='#fff' font-weight='700'>arrive (auto)</text>
<text x='315' y='248' font-size='9.5' text-anchor='middle' fill='#666'>arrv: 0→1, tx done</text>
<text x='315' y='262' font-size='10' text-anchor='middle' fill='#e0b300' font-weight='700'>phase: 0→1</text>
<!-- consumer events -->
<rect x='100' y='305' width='130' height='30' fill='#ccc'/>
<text x='165' y='325' font-size='10.5' text-anchor='middle' fill='#222'>wait_barrier</text>
<text x='165' y='348' font-size='9.5' text-anchor='middle' fill='#888' font-style='italic'>blocked, my_phase=0</text>
<rect x='250' y='305' width='180' height='30' fill='#ccc' opacity='0.5'/>
<text x='340' y='325' font-size='10.5' text-anchor='middle' fill='#222'>(等待 phase 翻转)</text>
<rect x='460' y='305' width='150' height='30' fill='#5fa55f' opacity='0.45'/>
<text x='535' y='325' font-size='10.5' text-anchor='middle' fill='#fff' font-weight='700'>resume! phase=1</text>
<rect x='630' y='305' width='160' height='30' fill='#5fa55f' opacity='0.30'/>
<text x='710' y='325' font-size='10.5' text-anchor='middle' fill='#1a5a1a'>tcgen05.mma ×N</text>
<rect x='810' y='305' width='130' height='30' fill='#5fa55f' opacity='0.50'/>
<text x='875' y='325' font-size='10.5' text-anchor='middle' fill='#fff' font-weight='700'>umma_arrive</text>
<text x='875' y='348' font-size='10' text-anchor='middle' fill='#e0b300' font-weight='700'>phase: 1→0</text>
<!-- arrows -->
<line x1='315' y1='235' x2='315' y2='305' stroke='#e0b300' stroke-width='1.8' marker-end='url(#ar)' stroke-dasharray='4 2'/>
<text x='340' y='278' font-size='10' fill='#e0b300' font-style='italic'>phase flip 唤醒 consumer</text>
<rect x='40' y='400' width='940' height='70' fill='#efe' stroke='#5fa55f' rx='4'/>
<text x='510' y='423' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>设计精髓：把“等待”和“通知”统一成一条原子操作</text>
<text x='510' y='443' font-size='11' text-anchor='middle' fill='#1a5a1a'>TMA / tcgen05.cp / tcgen05.mma 全部接 mbarrier；软件不写任何 fence/commit/wait 三段式。</text>
<text x='510' y='460' font-size='11' text-anchor='middle' fill='#1a5a1a'>多种异步引擎共享同一种同步原语 — Blackwell“全异步”得以成立的关键。</text>
</svg>
