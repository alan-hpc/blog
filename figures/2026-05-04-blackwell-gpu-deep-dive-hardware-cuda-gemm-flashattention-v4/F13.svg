<svg viewBox='0 0 1020 280' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Preferred Cluster：允许两套 cluster shape，硬件优先大、用小填空</text>
<text x='280' y='53' font-size='12' text-anchor='middle' fill='#1f2328' font-weight='700'>BEFORE · 单一 cluster size 4，剩余 SM 闲置</text><rect x='60' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='86' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='120' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='146' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='180' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='206' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='240' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='266' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='60' y='125' width='52' height='52' rx='4' fill='#ddd' opacity='0.50' stroke='#333'/><text x='86' y='155' font-size='10' text-anchor='middle' fill='#222'>idle</text><rect x='120' y='125' width='52' height='52' rx='4' fill='#ddd' opacity='0.50' stroke='#333'/><text x='146' y='155' font-size='10' text-anchor='middle' fill='#222'>idle</text><rect x='180' y='125' width='52' height='52' rx='4' fill='#ddd' opacity='0.50' stroke='#333'/><text x='206' y='155' font-size='10' text-anchor='middle' fill='#222'>idle</text><rect x='240' y='125' width='52' height='52' rx='4' fill='#ddd' opacity='0.50' stroke='#333'/><text x='266' y='155' font-size='10' text-anchor='middle' fill='#222'>idle</text>
<text x='780' y='53' font-size='12' text-anchor='middle' fill='#1f2328' font-weight='700'>AFTER · Preferred=4，回退=2，全 SM 占满</text><rect x='560' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='586' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='620' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='646' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='680' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='706' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='740' y='65' width='52' height='52' rx='4' fill='#4a6fd3' opacity='0.50' stroke='#333'/><text x='766' y='95' font-size='10' text-anchor='middle' fill='#222'>C1</text><rect x='560' y='125' width='52' height='52' rx='4' fill='#5fa55f' opacity='0.50' stroke='#333'/><text x='586' y='155' font-size='10' text-anchor='middle' fill='#222'>C2</text><rect x='620' y='125' width='52' height='52' rx='4' fill='#5fa55f' opacity='0.50' stroke='#333'/><text x='646' y='155' font-size='10' text-anchor='middle' fill='#222'>C2</text><rect x='680' y='125' width='52' height='52' rx='4' fill='#e0b300' opacity='0.50' stroke='#333'/><text x='706' y='155' font-size='10' text-anchor='middle' fill='#222'>C3</text><rect x='740' y='125' width='52' height='52' rx='4' fill='#e0b300' opacity='0.50' stroke='#333'/><text x='766' y='155' font-size='10' text-anchor='middle' fill='#222'>C3</text>
<rect x='60' y='205' width='420' height='60' fill='#fee' stroke='#b85450'/>
<text x='270' y='225' font-size='11.5' text-anchor='middle' font-weight='700' fill='#5a1a1a'>Hopper 的限制</text>
<text x='270' y='243' font-size='11' text-anchor='middle' fill='#5a1a1a'>cluster size 必须整除 grid，且 ≤ 8 (默认)</text>
<text x='270' y='258' font-size='11' text-anchor='middle' fill='#5a1a1a'>大 cluster 装不下 → 回退到无 cluster 浪费数据共享</text>
<rect x='560' y='205' width='420' height='60' fill='#efe' stroke='#5fa55f'/>
<text x='770' y='225' font-size='11.5' text-anchor='middle' font-weight='700' fill='#1a5a1a'>Blackwell 解法</text>
<text x='770' y='243' font-size='11' text-anchor='middle' fill='#1a5a1a'>kernel 启动传两个 shape：preferred + fallback</text>
<text x='770' y='258' font-size='11' text-anchor='middle' fill='#1a5a1a'>硬件先尝试大的，剩下用小的，CUTLASS 已运行时支持</text>
</svg>
