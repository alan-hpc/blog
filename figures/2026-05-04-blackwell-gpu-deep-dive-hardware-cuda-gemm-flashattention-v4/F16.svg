<svg viewBox='0 0 1020 380' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Scale Factor 在 TMEM 中的多播布局：每个 sub-partition 各持完整副本</text>
<!-- GMEM -->
<rect x='40' y='70' width='180' height='180' fill='#eef' stroke='#4a6fd3' stroke-width='1.5'/>
<text x='130' y='95' font-size='13' text-anchor='middle' font-weight='700' fill='#4a6fd3'>GMEM</text>
<text x='130' y='115' font-size='11' text-anchor='middle' fill='#222'>scale matrix</text>
<text x='130' y='135' font-size='10.5' text-anchor='middle' fill='#666'>K-major 紧凑存储</text>
<text x='130' y='175' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>TMA 加载需要</text>
<text x='130' y='190' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>预先 reshape+transpose</text>
<text x='130' y='220' font-size='10' text-anchor='middle' fill='#888' font-style='italic'>到 hardware layout</text>
<!-- SMEM -->
<rect x='280' y='70' width='180' height='180' fill='#eef7ff' stroke='#4a6fd3' stroke-width='1.5'/>
<text x='370' y='95' font-size='13' text-anchor='middle' font-weight='700' fill='#4a6fd3'>SMEM</text>
<text x='370' y='115' font-size='11' text-anchor='middle' fill='#222'>interleaved layout</text>
<text x='370' y='150' font-size='9.5' text-anchor='middle' font-family='monospace' fill='#444'>(((32,4),REST_M),</text>
<text x='370' y='165' font-size='9.5' text-anchor='middle' font-family='monospace' fill='#444'>((16,4),REST_K))</text>
<text x='370' y='195' font-size='10' text-anchor='middle' fill='#666' font-style='italic'>vectorized, coalesced</text>
<text x='370' y='210' font-size='10' text-anchor='middle' fill='#666' font-style='italic'>无 bank conflict</text>
<!-- TMEM with 4 sub-partitions -->
<text x='720' y='60' font-size='13' text-anchor='middle' font-weight='700' fill='#a33ea1'>TMEM (4 sub-partitions)</text>
<g>
<rect x='550' y='70' width='340' height='40' fill='#a33ea1' opacity='0.20' stroke='#a33ea1'/>
<text x='720' y='95' font-size='10.5' text-anchor='middle' fill='#4a1a48'>sub-part 0 · lanes 0–31 · scale 副本 #1</text>
<rect x='550' y='115' width='340' height='40' fill='#a33ea1' opacity='0.20' stroke='#a33ea1'/>
<text x='720' y='140' font-size='10.5' text-anchor='middle' fill='#4a1a48'>sub-part 1 · lanes 32–63 · scale 副本 #2</text>
<rect x='550' y='160' width='340' height='40' fill='#a33ea1' opacity='0.20' stroke='#a33ea1'/>
<text x='720' y='185' font-size='10.5' text-anchor='middle' fill='#4a1a48'>sub-part 2 · lanes 64–95 · scale 副本 #3</text>
<rect x='550' y='205' width='340' height='40' fill='#a33ea1' opacity='0.20' stroke='#a33ea1'/>
<text x='720' y='230' font-size='10.5' text-anchor='middle' fill='#4a1a48'>sub-part 3 · lanes 96–127 · scale 副本 #4</text>
</g>
<line x1='220' y1='160' x2='280' y2='160' stroke='#888' marker-end='url(#ar)'/>
<text x='250' y='150' font-size='10' text-anchor='middle' fill='#888'>TMA</text>
<line x1='460' y1='160' x2='550' y2='110' stroke='#e0b300' marker-end='url(#ar)' stroke-width='1.5'/>
<line x1='460' y1='160' x2='550' y2='155' stroke='#e0b300' marker-end='url(#ar)' stroke-width='1.5'/>
<line x1='460' y1='160' x2='550' y2='200' stroke='#e0b300' marker-end='url(#ar)' stroke-width='1.5'/>
<line x1='460' y1='160' x2='550' y2='245' stroke='#e0b300' marker-end='url(#ar)' stroke-width='1.5'/>
<text x='490' y='115' font-size='10.5' fill='#e0b300' font-weight='700' font-family='monospace'>tcgen05.cp.warpx4</text>
<text x='495' y='130' font-size='10' fill='#e0b300' font-style='italic'>multicast 4 份</text>
<rect x='40' y='270' width='960' height='90' fill='#fffbe7' stroke='#e0b300' rx='4'/>
<text x='520' y='292' font-size='12' text-anchor='middle' font-weight='700' fill='#7a4500'>为什么 scale 必须复制 4 份？</text>
<text x='520' y='312' font-size='11' text-anchor='middle' fill='#5a3500'>每个 warp 只能访问<tspan font-weight='700'>同 sub-partition</tspan>的 32 lanes（见 F5）；MMA 内部所有 lane 都要读 scale</text>
<text x='520' y='330' font-size='11' text-anchor='middle' fill='#5a3500'>硬件就让每个 sub-partition 各持完整副本，避免跨 partition 总线热点</text>
<text x='520' y='348' font-size='10.5' text-anchor='middle' fill='#5a3500' font-style='italic'>典型例子：TMEM 物理分区限制传染到上层数据布局</text>
</svg>
