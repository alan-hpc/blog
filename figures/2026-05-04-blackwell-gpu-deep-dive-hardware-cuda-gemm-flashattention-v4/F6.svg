<svg viewBox='0 0 1000 280' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='500' y='30' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>TMEM 寻址：32-bit word，高 16 位 lane ID、低 16 位 column</text>
<!-- bit layout -->
<rect x='100' y='70' width='400' height='44' fill='#e0b300' opacity='0.18' stroke='#e0b300' stroke-width='2'/>
<text x='300' y='95' font-size='13' text-anchor='middle' font-weight='700' fill='#7a4500'>bits [31:16] · lane ID</text>
<text x='300' y='110' font-size='10.5' text-anchor='middle' fill='#7a4500'>0–127 有效</text>
<rect x='500' y='70' width='400' height='44' fill='#5fa55f' opacity='0.18' stroke='#5fa55f' stroke-width='2'/>
<text x='700' y='95' font-size='13' text-anchor='middle' font-weight='700' fill='#1a5a1a'>bits [15:0] · column</text>
<text x='700' y='110' font-size='10.5' text-anchor='middle' fill='#1a5a1a'>0–511 有效</text>
<!-- example: lane 64, col 17 -->
<text x='100' y='160' font-size='13' fill='#222'>例：访问 (lane=64, col=17)</text>
<rect x='100' y='175' width='400' height='32' fill='#fff' stroke='#e0b300' stroke-width='1.5'/>
<text x='300' y='196' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>0x0040 (= 64 &lt;&lt; 16)</text>
<rect x='500' y='175' width='400' height='32' fill='#fff' stroke='#5fa55f' stroke-width='1.5'/>
<text x='700' y='196' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>0x0011 (= 17)</text>
<text x='100' y='225' font-size='12' fill='#444'>合并 → 32-bit 地址：</text>
<rect x='240' y='212' width='180' height='28' fill='#222'/>
<text x='330' y='231' font-size='13' text-anchor='middle' font-family='monospace' fill='#fff'>0x00400011</text>
<!-- caveats -->
<rect x='480' y='220' width='420' height='52' fill='#fff5f0' stroke='#b85450' stroke-width='1.5'/>
<text x='495' y='240' font-size='12' fill='#5a1a1a' font-weight='700'>⚠ 关键限制</text>
<text x='495' y='258' font-size='11' fill='#5a1a1a'>· 非线性寻址：不能像普通指针那样 dereference</text>
<text x='495' y='272' font-size='11' fill='#5a1a1a'>· 唯一访问方式 = tcgen05.ld / tcgen05.st / tcgen05.cp</text>
</svg>
