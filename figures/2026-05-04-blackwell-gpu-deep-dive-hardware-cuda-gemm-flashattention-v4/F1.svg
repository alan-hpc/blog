<svg viewBox='0 0 1000 320' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='500' y='30' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Tensor Core 四代演进：发射粒度从「线程」到「warp-group」再回到「单线程异步」</text>
<rect x='60' y='60' width='190' height='200' rx='8' fill='#4a6fd3' opacity='0.10' stroke='#4a6fd3' stroke-width='2'/>
<text x='155' y='85' font-size='15' font-weight='700' text-anchor='middle' fill='#4a6fd3'>Volta / Turing</text>
<text x='155' y='105' font-size='11.5' text-anchor='middle' fill='#666'>2017–2018</text>
<text x='155' y='140' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>mma.sync</text>
<text x='155' y='158' font-size='10.5' text-anchor='middle' fill='#666'>(线程级)</text>
<line x1='75' y1='180' x2='235' y2='180' stroke='#4a6fd3' stroke-width='1' stroke-dasharray='3 2'/>
<text x='155' y='205' font-size='10.5' text-anchor='middle' fill='#333' font-weight='600'>新增能力</text>
<text x='155' y='225' font-size='11' text-anchor='middle' fill='#444'>FP16</text>
<line x1='250' y1='160' x2='280' y2='160' stroke='#999' stroke-width='2' marker-end='url(#ar)'/>
<rect x='280' y='60' width='190' height='200' rx='8' fill='#4a6fd3' opacity='0.10' stroke='#4a6fd3' stroke-width='2'/>
<text x='375' y='85' font-size='15' font-weight='700' text-anchor='middle' fill='#4a6fd3'>Ampere</text>
<text x='375' y='105' font-size='11.5' text-anchor='middle' fill='#666'>2020</text>
<text x='375' y='140' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>mma + cp.async</text>
<text x='375' y='158' font-size='10.5' text-anchor='middle' fill='#666'>(线程级 + 异步访存)</text>
<line x1='295' y1='180' x2='455' y2='180' stroke='#4a6fd3' stroke-width='1' stroke-dasharray='3 2'/>
<text x='375' y='205' font-size='10.5' text-anchor='middle' fill='#333' font-weight='600'>新增能力</text>
<text x='375' y='225' font-size='11' text-anchor='middle' fill='#444'>FP16/BF16/TF32</text>
<line x1='470' y1='160' x2='500' y2='160' stroke='#999' stroke-width='2' marker-end='url(#ar)'/>
<rect x='500' y='60' width='190' height='200' rx='8' fill='#e0b300' opacity='0.10' stroke='#e0b300' stroke-width='2'/>
<text x='595' y='85' font-size='15' font-weight='700' text-anchor='middle' fill='#e0b300'>Hopper</text>
<text x='595' y='105' font-size='11.5' text-anchor='middle' fill='#666'>2022</text>
<text x='595' y='140' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>wgmma</text>
<text x='595' y='158' font-size='10.5' text-anchor='middle' fill='#666'>(warp-group 异步)</text>
<line x1='515' y1='180' x2='675' y2='180' stroke='#e0b300' stroke-width='1' stroke-dasharray='3 2'/>
<text x='595' y='205' font-size='10.5' text-anchor='middle' fill='#333' font-weight='600'>新增能力</text>
<text x='595' y='225' font-size='11' text-anchor='middle' fill='#444'>FP8 + TMA</text>
<line x1='690' y1='160' x2='720' y2='160' stroke='#999' stroke-width='2' marker-end='url(#ar)'/>
<rect x='720' y='60' width='190' height='200' rx='8' fill='#5fa55f' opacity='0.10' stroke='#5fa55f' stroke-width='2'/>
<text x='815' y='85' font-size='15' font-weight='700' text-anchor='middle' fill='#5fa55f'>Blackwell</text>
<text x='815' y='105' font-size='11.5' text-anchor='middle' fill='#666'>2024</text>
<text x='815' y='140' font-size='12' text-anchor='middle' font-family='monospace' fill='#222'>tcgen05.mma</text>
<text x='815' y='158' font-size='10.5' text-anchor='middle' fill='#666'>(单线程异步)</text>
<line x1='735' y1='180' x2='895' y2='180' stroke='#5fa55f' stroke-width='1' stroke-dasharray='3 2'/>
<text x='815' y='205' font-size='10.5' text-anchor='middle' fill='#333' font-weight='600'>新增能力</text>
<text x='815' y='225' font-size='11' text-anchor='middle' fill='#444'>FP4/FP6 + TMEM + block-scale</text>
<text x='500' y='295' font-size='12' text-anchor='middle' fill='#666' font-style='italic'>注意：Blackwell 把发射粒度从 warp-group 降回单线程，但语义是异步的</text>
</svg>
