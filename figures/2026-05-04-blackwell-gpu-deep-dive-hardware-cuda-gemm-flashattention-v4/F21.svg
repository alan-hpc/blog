<text x='120' y='130' font-size='11' text-anchor='middle' fill='#5a3500'>LZ4 / Snappy / Zstd</text>
<text x='120' y='148' font-size='11' text-anchor='middle' fill='#5a3500'>Bitcomp / GZIP / ANS</text>
<text x='120' y='166' font-size='10.5' text-anchor='middle' fill='#7a4500' font-style='italic'>容量 × 压缩比</text>
