<text x='510' y='243' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>等价于把 HBM 容量与带宽双双“放大”按压缩比</text>
<text x='510' y='262' font-size='11' text-anchor='middle' fill='#1a5a1a'>200B 模型用 Bitcomp(3×) 压缩 → 在 HBM 中只占 1/3 空间，等效带宽提升 3×</text>
