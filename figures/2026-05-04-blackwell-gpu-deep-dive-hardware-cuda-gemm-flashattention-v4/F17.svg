<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Sub-Byte FP4 路径：GMEM 紧凑 → SMEM 16-byte 对齐 → TMEM 1-byte/elem</text>
<!-- GMEM packed -->
<text x='40' y='80' font-size='12' fill='#222' font-weight='700'>GMEM (packed)</text>
<g><rect x='180' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='195' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='210' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='225' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='240' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='255' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='270' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='285' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='300' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='315' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='330' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='345' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='360' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='375' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='390' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='405' y='65' width='13' height='30' fill='#4a6fd3' opacity='0.45' stroke='#333' stroke-width='0.5'/></g>
<text x='340' y='110' font-size='10' text-anchor='middle' fill='#666'>16 个 4-bit elem = 8 byte 紧凑</text>
<!-- SMEM padded -->
<text x='40' y='180' font-size='12' fill='#222' font-weight='700'>SMEM (16-byte 对齐)</text>
<g><rect x='180' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='202' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='224' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='246' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='268' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='290' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='312' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='334' y='165' width='20' height='30' fill='#5fa55f' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='356' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='378' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='400' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='422' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='444' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='466' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='488' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/><rect x='510' y='165' width='20' height='30' fill='#ddd' stroke='#888' stroke-width='0.5'/></g>
<text x='340' y='210' font-size='10' text-anchor='middle' fill='#666'>8 byte 数据 + 8 byte padding = 16 byte</text>
<!-- TMEM padded -->
<text x='600' y='130' font-size='12' fill='#222' font-weight='700'>TMEM (1-byte/elem)</text>
<g><rect x='780' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='793' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='806' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='819' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='832' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='845' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='858' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='871' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='884' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='897' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='910' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='923' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='936' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='949' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='962' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/><rect x='975' y='115' width='11' height='30' fill='#a33ea1' opacity='0.45' stroke='#333' stroke-width='0.5'/></g>
<text x='870' y='160' font-size='10' text-anchor='middle' fill='#666'>每元素占 1 byte (带 padding)</text>
<!-- arrows -->
<line x1='180' y1='80' x2='180' y2='160' stroke='#e0b300' stroke-width='2' marker-end='url(#ar)'/>
<text x='100' y='130' font-size='11' fill='#e0b300' font-weight='700'>TMA unpack</text>
<text x='100' y='145' font-size='10' fill='#e0b300' font-family='monospace'>16U4_ALIGN16B</text>
<line x1='540' y1='180' x2='780' y2='130' stroke='#e0b300' stroke-width='2' marker-end='url(#ar)'/>
<text x='660' y='148' font-size='10.5' fill='#e0b300' font-weight='700' font-family='monospace'>tcgen05.cp</text>
<!-- annotations -->
<rect x='40' y='240' width='465' height='110' fill='#fff5f0' stroke='#b85450'/>
<text x='270' y='262' font-size='12' text-anchor='middle' font-weight='700' fill='#5a1a1a'>问题 · 三种格式不兼容</text>
<text x='270' y='282' font-size='11' text-anchor='middle' fill='#5a1a1a'>GMEM 想紧凑（节省 HBM 容量与带宽）</text>
<text x='270' y='300' font-size='11' text-anchor='middle' fill='#5a1a1a'>Tensor Core spatial array 只接受 1-byte/elem (容易寻址)</text>
<text x='270' y='318' font-size='11' text-anchor='middle' fill='#5a1a1a'>SMEM 必须 16-byte 对齐（swizzle 单位）</text>
<text x='270' y='340' font-size='10.5' text-anchor='middle' fill='#5a1a1a' font-style='italic'>"在哪一步把 packed 变成 padded？"</text>
<rect x='535' y='240' width='465' height='110' fill='#f4faf4' stroke='#5fa55f'/>
<text x='765' y='262' font-size='12' text-anchor='middle' font-weight='700' fill='#1a5a1a'>How · 让 TMA 顺手做 unpack</text>
<text x='765' y='282' font-size='11' text-anchor='middle' fill='#1a5a1a'>TMA 是带 layout descriptor 的 DMA 引擎</text>
<text x='765' y='300' font-size='11' text-anchor='middle' fill='#1a5a1a'>新增 tensor map 类型 CU_TENSOR_MAP_DATA_TYPE_16U4_ALIGN16B</text>
<text x='765' y='318' font-size='11' text-anchor='middle' fill='#1a5a1a'>读 16 个 packed FP4 + 自动加 8 byte padding 写入 SMEM</text>
<text x='765' y='340' font-size='10.5' text-anchor='middle' fill='#1a5a1a' font-style='italic'>对 Tensor Core 完全透明</text>
</svg>
