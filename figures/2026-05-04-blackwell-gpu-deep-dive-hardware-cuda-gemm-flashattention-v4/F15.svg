<svg viewBox='0 0 1020 470' xmlns='http://www.w3.org/2000/svg' font-family='sans-serif'>
<defs>
<marker id='ar' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#333'/></marker>
<marker id='arR' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#b85450'/></marker>
<marker id='arG' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#5fa55f'/></marker>
<marker id='arB' viewBox='0 0 10 10' refX='9' refY='5' markerWidth='8' markerHeight='8' orient='auto'>
<path d='M0,0 L10,5 L0,10 z' fill='#4a6fd3'/></marker>
</defs>
<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Block-Scaled MMA：D = (A·sA) × (B·sB) + C，反量化-MMA-累加全部硬件原语化</text>
<!-- Operand A row -->
<text x='40' y='80' font-size='12' fill='#222' font-weight='700'>A (FP4/FP6/FP8)</text>
<g>
<rect x='180' y='65' width='40' height='30' fill='#4a6fd3' opacity='0.4'/>
<rect x='220' y='65' width='40' height='30' fill='#4a6fd3' opacity='0.4'/>
<rect x='260' y='65' width='40' height='30' fill='#4a6fd3' opacity='0.4'/>
<rect x='300' y='65' width='40' height='30' fill='#4a6fd3' opacity='0.4'/>
<text x='260' y='110' font-size='10' text-anchor='middle' fill='#666'>← 32 elements (1 block) →</text>
</g>
<text x='420' y='85' font-size='14' fill='#222'>×</text>
<rect x='450' y='65' width='80' height='30' fill='#e0b300' opacity='0.5' stroke='#e0b300' stroke-width='1.5'/>
<text x='490' y='86' font-size='11' text-anchor='middle' fill='#7a4500' font-weight='700'>sA (UE8M0)</text>
<text x='490' y='110' font-size='10' text-anchor='middle' fill='#666'>1 个 8-bit scale</text>
<!-- Operand B row -->
<text x='40' y='180' font-size='12' fill='#222' font-weight='700'>B (FP4/FP6/FP8)</text>
<g>
<rect x='180' y='165' width='40' height='30' fill='#5fa55f' opacity='0.4'/>
<rect x='220' y='165' width='40' height='30' fill='#5fa55f' opacity='0.4'/>
<rect x='260' y='165' width='40' height='30' fill='#5fa55f' opacity='0.4'/>
<rect x='300' y='165' width='40' height='30' fill='#5fa55f' opacity='0.4'/>
<text x='260' y='210' font-size='10' text-anchor='middle' fill='#666'>← 32 elements (1 block) →</text>
</g>
<text x='420' y='185' font-size='14' fill='#222'>×</text>
<rect x='450' y='165' width='80' height='30' fill='#e0b300' opacity='0.5' stroke='#e0b300' stroke-width='1.5'/>
<text x='490' y='186' font-size='11' text-anchor='middle' fill='#7a4500' font-weight='700'>sB (UE8M0)</text>
<!-- Tensor Core box -->
<rect x='620' y='90' width='200' height='100' fill='#b85450' opacity='0.18' stroke='#b85450' stroke-width='2' rx='8'/>
<text x='720' y='118' font-size='13' text-anchor='middle' font-weight='700' fill='#5a1a1a'>5th-gen Tensor Core</text>
<text x='720' y='140' font-size='11' text-anchor='middle' fill='#5a1a1a' font-family='monospace'>tcgen05.mma</text>
<text x='720' y='158' font-size='11' text-anchor='middle' fill='#5a1a1a' font-family='monospace'>.kind::mxf4nvf4</text>
<text x='720' y='176' font-size='11' text-anchor='middle' fill='#5a1a1a' font-family='monospace'>.block_scale.scale_vec::1X</text>
<line x1='540' y1='80' x2='620' y2='115' stroke='#333' marker-end='url(#ar)'/>
<line x1='540' y1='180' x2='620' y2='160' stroke='#333' marker-end='url(#ar)'/>
<!-- Output -->
<rect x='870' y='115' width='110' height='50' fill='#a33ea1' opacity='0.20' stroke='#a33ea1' stroke-width='1.5'/>
<text x='925' y='138' font-size='12' text-anchor='middle' font-weight='700' fill='#4a1a48'>D in TMEM</text>
<text x='925' y='155' font-size='10.5' text-anchor='middle' fill='#4a1a48'>(FP32 累加)</text>
<line x1='820' y1='140' x2='870' y2='140' stroke='#a33ea1' marker-end='url(#ar)'/>
<!-- Compare box -->
<rect x='40' y='240' width='460' height='210' fill='#fff5f0' stroke='#b85450' stroke-width='2' rx='6'/>
<text x='270' y='262' font-size='12' text-anchor='middle' font-weight='700' fill='#b85450'>BEFORE · Hopper 软件 block-scaling</text>
<rect x='60' y='275' width='420' height='30' fill='#fff'/>
<text x='270' y='295' font-size='11' text-anchor='middle' fill='#222'>① cp.async 加载 A、B 到 SMEM</text>
<rect x='60' y='312' width='420' height='30' fill='#fff'/>
<text x='270' y='332' font-size='11' text-anchor='middle' fill='#222'>② 软件 kernel 把 (A·sA, B·sB) 算出来写回 SMEM</text>
<rect x='60' y='349' width='420' height='30' fill='#fff'/>
<text x='270' y='369' font-size='11' text-anchor='middle' fill='#222'>③ wgmma 消费"已反量化"的 SMEM</text>
<text x='270' y='405' font-size='11' text-anchor='middle' fill='#5a1a1a' font-style='italic'>额外 cycle、额外 SMEM、人工流水难写</text>
<text x='270' y='430' font-size='11' text-anchor='middle' fill='#5a1a1a' font-weight='700'>FP4/FP6 的“理论 PFLOPS”够不到</text>
<rect x='540' y='240' width='460' height='210' fill='#f4faf4' stroke='#5fa55f' stroke-width='2' rx='6'/>
<text x='770' y='262' font-size='12' text-anchor='middle' font-weight='700' fill='#5fa55f'>AFTER · Blackwell 硬件 block-scaling</text>
<rect x='560' y='275' width='420' height='30' fill='#fff'/>
<text x='770' y='295' font-size='11' text-anchor='middle' fill='#222'>① TMA 加载 A、B、sA、sB 到 SMEM/TMEM</text>
<rect x='560' y='312' width='420' height='30' fill='#fff'/>
<text x='770' y='332' font-size='11' text-anchor='middle' fill='#222'>② tcgen05.mma.block_scale 一条指令完成 (A·sA)(B·sB)</text>
<rect x='560' y='349' width='420' height='30' fill='#fff'/>
<text x='770' y='369' font-size='11' text-anchor='middle' fill='#222'>③ Tensor Core 内部 dequant + MMA + 累加 fused</text>
<text x='770' y='405' font-size='11' text-anchor='middle' fill='#1a5a1a' font-style='italic'>FP4 实测 7702 TFLOPS · 96.3% 峰值</text>
<text x='770' y='430' font-size='11' text-anchor='middle' fill='#1a5a1a' font-weight='700'>低精度变得"可用"的前提</text>
</svg>
