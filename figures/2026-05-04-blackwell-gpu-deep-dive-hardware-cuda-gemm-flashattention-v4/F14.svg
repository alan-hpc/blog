<line x1='580' y1='105' x2='600' y2='140' stroke='#999' marker-end='url(#ar)'/>
<line x1='720' y1='105' x2='740' y2='140' stroke='#999' marker-end='url(#ar)'/>
<line x1='860' y1='170' x2='860' y2='205' stroke='#a33ea1' marker-end='url(#ar)'/>
<!-- pipeline depth annotation -->
<rect x='180' y='75' width='720' height='160' fill='none' stroke='#e0b300' stroke-width='1.5' stroke-dasharray='5 3' rx='3'/>
<text x='540' y='258' font-size='11' text-anchor='middle' fill='#e0b300' font-weight='700'>3-stage software pipeline · TMA k+2 与 MMA k 同时进行</text>
<rect x='160' y='305' width='820' height='40' fill='#efe' stroke='#5fa55f'/>
<text x='570' y='327' font-size='11' text-anchor='middle' fill='#1a5a1a'>关键差异 vs Hopper：MMA dispatcher 是 <tspan font-weight='700'>1 thread</tspan>；累加器在 TMEM，SMEM 在 mma 完成后立即可被下一轮 TMA 覆盖</text>
