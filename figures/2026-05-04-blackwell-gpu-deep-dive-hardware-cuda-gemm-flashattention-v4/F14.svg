<text x='510' y='28' font-size='15' font-weight='700' text-anchor='middle' fill='#1f2328'>Dense GEMM mainloop · 3 角色 4 stage 软件流水时间线</text>
<!-- axes -->
<line x1='160' y1='60' x2='160' y2='280' stroke='#888' stroke-width='1.2'/>
<line x1='160' y1='280' x2='980' y2='280' stroke='#888' stroke-width='1.2'/>
<text x='980' y='298' font-size='11' text-anchor='end' fill='#666'>time →</text>
<!-- rows -->
<text x='150' y='95' font-size='12' text-anchor='end' fill='#222' font-weight='700'>TMA warp</text>
<text x='150' y='160' font-size='12' text-anchor='end' fill='#222' font-weight='700'>MMA dispatcher</text>
<text x='150' y='225' font-size='12' text-anchor='end' fill='#222' font-weight='700'>Epilogue WG</text>
