<rect x='460' y='75' width='120' height='30' fill='#4a6fd3' opacity='0.50'/>
<text x='520' y='95' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>load k=2</text>
<rect x='600' y='75' width='120' height='30' fill='#4a6fd3' opacity='0.50'/>
<text x='660' y='95' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>load k=3</text>
