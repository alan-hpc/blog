<rect x='320' y='140' width='120' height='30' fill='#5fa55f' opacity='0.55'/>
<text x='380' y='160' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>mma k=0</text>
<rect x='460' y='140' width='120' height='30' fill='#5fa55f' opacity='0.55'/>
<text x='520' y='160' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>mma k=1</text>
<rect x='600' y='140' width='120' height='30' fill='#5fa55f' opacity='0.55'/>
<text x='660' y='160' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>mma k=2</text>
<rect x='740' y='140' width='120' height='30' fill='#5fa55f' opacity='0.55'/>
<text x='800' y='160' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>mma k=3</text>
