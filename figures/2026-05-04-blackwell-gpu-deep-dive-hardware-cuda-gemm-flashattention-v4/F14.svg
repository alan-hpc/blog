<!-- TMA: 5 stages -->
<rect x='180' y='75' width='120' height='30' fill='#4a6fd3' opacity='0.50'/>
<text x='240' y='95' font-size='11' text-anchor='middle' fill='#fff' font-weight='700'>load k=0</text>
<rect x='320' y='75' width='120' height='30' fill='#4a6fd3' opacity='0.50'/>
