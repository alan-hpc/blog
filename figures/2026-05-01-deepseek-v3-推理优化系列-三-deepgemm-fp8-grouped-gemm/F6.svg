nd="url(#arrow)"/><rect x="815" y="135" width="160" height="90" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="895.0" y="172.8" text-anchor="middle" font-size="15" font-weight="750" fill="#4a1c1a"><tspan x="895.0" dy="0.00em">WGMMA</tspan></text><text x="895.0" y="196.2" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="895.0" dy="0.00em">FP8 MMA + promotion</tspan></text><path d="M780,180 L815,180" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><rect x="190" y="295" width="620" height="62" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="500.0" y="321.04" text-anchor="middle" font-size="15" font-weight="750" fill="#24292f"><tspan x="500.0" dy="0.00em">Read kernel from outside to inside</tspan></text><text x="500.0" y="337.16" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="500.0" dy="0.00em">shape config → block scheduler → TMA/WGMMA pipeline → numeric promotion</tspan></text>
