  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="520" fill="#5b6775"><tspan x="500.0" dy="0.00em">A clean mental model for the source: scheduler owns tiles, warp groups own work, barriers own stages.</tspan></text>
