<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="390" viewBox="0 0 1000 390" role="img" aria-label="FP8 scale promotion">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="38" text-anchor="middle" font-size="23" font-weight="780" fill="#24292f"><tspan x="500.0" dy="0.00em">FP8 scale promotion</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="520" fill="#5b6775"><tspan x="500.0" dy="0.00em">Scale is applied at K-block boundaries; the raw WGMMA accumulation never needs a dequantized tensor.</tspan></text>
  <rect x="90" y="110" width="240" height="82" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="210.0" y="144.44" text-anchor="middle" font-size="15" font-weight="750" fill="#1f2d3d"><tspan x="210.0" dy="0.00em">FP8 Tensor Core</tspan></text><text x="210.0" y="165.76" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="210.0" dy="0.00em">raw partial sum per K-block</tspan></text><path d="M330,151 L410,151" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="370.0" y="143.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a"><tspan x="370.0" dy="0.00em">acc</tspan></text><rect x="410" y="110" width="240" height="82" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="530.0" y="144.44" text-anchor="middle" font-size="15" font-weight="750" fill="#1f3d24"><tspan x="530.0" dy="0.00em">CUDA core promotion</tspan></text><text x="530.0" y="165.76" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="530.0" dy="0.00em">multiply A_sf · B_sf</tspan></text><path d="M650,151 L730,151" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="690.0" y="143.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a"><tspan x="690.0" dy="0.00em">FP32</tspan></text><rect x="730" y="110" width="190" height="82" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="825.0" y="144.44" text-anchor="middle" font-size="15" font-weight="750" fill="#4a3a00"><tspan x="825.0" dy="0.00em">final C</tspan></text><text x="825.0" y="165.76" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="825.0" dy="0.00em">BF16 / FP32 output</tspan></text><rect x="190" y="260" width="620" height="80" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="500.0" y="293.6" text-anchor="middle" font-size="15" font-weight="750" fill="#24292f"><tspan x="500.0" dy="0.00em">C_ij = Σ_b sA_i,b · sB_j,b · Σ_r A8_i,128b+r · B8_j,128b+r</tspan></text><text x="500.0" y="314.4" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="500.0" dy="0.00em">same math as dequantize-first, without materializing dequantized tiles</tspan></text>
</svg>
