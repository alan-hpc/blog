<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="sans-serif">
  <defs>
    <marker id="arr8" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a6fd3"/>
    </marker>
  </defs>

  <text x="500" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#222">Shape-dependent config · 用非 2 的幂 BLOCK_N 贴 SM 数</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#666">M=256, K=7168 / N=7168 · 132 SM 目标 → BLOCK_N=128 留空洞，BLOCK_N=112 贴满</text>

  <!-- Left case: BLOCK_N = 128 → 112 CTAs -->
  <g>
    <rect x="60" y="80" width="380" height="280" fill="#fff5f0" stroke="#b85450" stroke-width="1.5" rx="6"/>
    <text x="250" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#b85450">BLOCK_N = 128 · 标准对齐</text>
    <text x="250" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#444">⌈256/128⌉ · ⌈7168/128⌉ = 2 · 56 = 112 CTAs</text>

    <!-- 132 SM bar -->
    <text x="80" y="160" font-size="11" fill="#666">132 SM</text>
    <rect x="80" y="168" width="320" height="22" fill="#eaeaea" stroke="#999"/>
    <!-- Filled portion = 112/132 ≈ 84.85% → 271.5px -->
    <rect x="80" y="168" width="271" height="22" fill="#b85450" opacity="0.85"/>
    <text x="216" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="white">112 占用</text>
    <rect x="351" y="168" width="49" height="22" fill="none" stroke="#b85450" stroke-dasharray="3,2"/>
    <text x="375" y="184" text-anchor="middle" font-size="10" fill="#b85450">空洞 20</text>

    <!-- Wave description -->
    <text x="80" y="225" font-size="11" font-weight="700" fill="#444">wave 0 · 112 SM 工作，20 SM 空闲</text>
    <text x="80" y="245" font-size="11" fill="#666">→ persistent kernel 一波算完，但 ~15% SM 闲置</text>

    <text x="80" y="285" font-size="11" font-weight="700" fill="#b85450">问题：N=7168 不是 128 的倍数</text>
    <text x="80" y="303" font-size="11" fill="#444">⌈7168/128⌉ = 56，56 × 2 = 112 &lt; 132</text>
    <text x="80" y="321" font-size="11" fill="#444">tile 数被 BLOCK_N 严格束缚</text>
    <text x="80" y="345" font-size="11" fill="#666">SM 利用率 ≈ 112/132 = 84.8%</text>
  </g>

  <!-- Right case: BLOCK_N = 112 → 128 CTAs -->
  <g>
    <rect x="560" y="80" width="380" height="280" fill="#f4faf4" stroke="#5fa55f" stroke-width="1.5" rx="6"/>
    <text x="750" y="106" text-anchor="middle" font-size="13" font-weight="700" fill="#5fa55f">BLOCK_N = 112 · 非 2 的幂</text>
    <text x="750" y="126" text-anchor="middle" font-family="monospace" font-size="11" fill="#444">⌈256/128⌉ · ⌈7168/112⌉ = 2 · 64 = 128 CTAs</text>

    <text x="580" y="160" font-size="11" fill="#666">132 SM</text>
    <rect x="580" y="168" width="320" height="22" fill="#eaeaea" stroke="#999"/>
    <!-- 128/132 = 96.97% → 310.3px -->
    <rect x="580" y="168" width="310" height="22" fill="#5fa55f" opacity="0.85"/>
    <text x="735" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="white">128 占用</text>
    <rect x="890" y="168" width="10" height="22" fill="none" stroke="#5fa55f" stroke-dasharray="3,2"/>
    <text x="895" y="208" text-anchor="middle" font-size="10" fill="#5fa55f">余 4</text>

    <text x="580" y="225" font-size="11" font-weight="700" fill="#444">wave 0 · 128 SM 工作，几乎贴满</text>
    <text x="580" y="245" font-size="11" fill="#666">→ persistent kernel 一波算完，SM 接近满载</text>

    <text x="580" y="285" font-size="11" font-weight="700" fill="#5fa55f">代价：BLOCK_N 不是硬件友好的 2 的幂</text>
    <text x="580" y="303" font-size="11" fill="#444">→ TMA box / WGMMA tile / swizzle 需要 JIT 重新生成</text>
    <text x="580" y="321" font-size="11" fill="#444">→ JIT 把 shape 静态化，分支与 loop bound 编译期消除</text>
    <text x="580" y="345" font-size="11" fill="#666">SM 利用率 ≈ 128/132 = 97.0%</text>
  </g>

  <text x="500" y="395" text-anchor="middle" font-size="11" fill="#666">block rasterization 与 swizzle 让相邻 tile 复用 L2，进一步把 mainloop 的 HBM 压力降下来。</text>
</svg>
