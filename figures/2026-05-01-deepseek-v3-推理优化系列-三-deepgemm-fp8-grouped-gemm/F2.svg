<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="430" viewBox="0 0 1000 430" role="img" aria-label="Two MoE grouped layouts, one GEMM contract">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="38" text-anchor="middle" font-size="23" font-weight="780" fill="#24292f"><tspan x="500.0" dy="0.00em">Two MoE grouped layouts, one GEMM contract</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="520" fill="#5b6775"><tspan x="500.0" dy="0.00em">DeepGEMM groups only the M axis; N and K stay fixed across experts.</tspan></text>
  <rect x="60" y="100" width="390" height="84" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="255.0" y="135.28" text-anchor="middle" font-size="15" font-weight="750" fill="#1f3d24"><tspan x="255.0" dy="0.00em">Contiguous layout</tspan></text><text x="255.0" y="157.12" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="255.0" dy="0.00em">prefill / training forward</tspan></text><rect x="550" y="100" width="390" height="84" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="745.0" y="135.28" text-anchor="middle" font-size="15" font-weight="750" fill="#1f2d3d"><tspan x="745.0" dy="0.00em">Masked layout</tspan></text><text x="745.0" y="157.12" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="745.0" dy="0.00em">decode / CUDA Graph replay</tspan></text><rect x="86" y="220" width="120" height="44" rx="18" fill="#eef8ef" stroke="#5aa463" stroke-width="1.5"/><text x="146.0" y="243.0" text-anchor="middle" font-size="13" font-weight="650" fill="#1f3d24"><tspan x="146.0" dy="0.00em">A: (MΣ,K)</tspan></text><rect x="226" y="220" width="160" height="44" rx="18" fill="#fff7df" stroke="#d8a500" stroke-width="1.5"/><text x="306.0" y="243.0" text-anchor="middle" font-size="13" font-weight="650" fill="#4a3a00"><tspan x="306.0" dy="0.00em">m_indices[m]</tspan></text><rect x="580" y="220" width="140" height="44" rx="18" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="1.5"/><text x="650.0" y="243.0" text-anchor="middle" font-size="13" font-weight="650" fill="#1f2d3d"><tspan x="650.0" dy="0.00em">A: (E,max_m,K)</tspan></text><rect x="742" y="220" width="160" height="44" rx="18" fill="#fff7df" stroke="#d8a500" stroke-width="1.5"/><text x="822.0" y="243.0" text-anchor="middle" font-size="13" font-weight="650" fill="#4a3a00"><tspan x="822.0" dy="0.00em">n_e per expert</tspan></text><rect x="110" y="305" width="270" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="245.0" y="334.4" text-anchor="middle" font-size="15" font-weight="750" fill="#24292f"><tspan x="245.0" dy="0.00em">compact M axis</tspan></text><text x="245.0" y="352.6" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="245.0" dy="0.00em">padding is aligned then skipped</tspan></text><rect x="610" y="305" width="270" height="70" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="745.0" y="334.4" text-anchor="middle" font-size="15" font-weight="750" fill="#24292f"><tspan x="745.0" dy="0.00em">fixed graph shape</tspan></text><text x="745.0" y="352.6" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="745.0" dy="0.00em">padding buys stable launch</tspan></text><path d="M255,184 L255,220" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><path d="M745,184 L745,220" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
