<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="470" viewBox="0 0 1000 470" role="img" aria-label="vLLM integration boundary">
  <defs>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#57606a"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: 0; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="500.0" y="38" text-anchor="middle" font-size="23" font-weight="780" fill="#24292f"><tspan x="500.0" dy="0.00em">vLLM integration boundary</tspan></text>
  <text x="500.0" y="66" text-anchor="middle" font-size="13" font-weight="520" fill="#5b6775"><tspan x="500.0" dy="0.00em">Backend selection is not decoration; it decides whether the DeepGEMM contract is available.</tspan></text>
  <rect x="70" y="110" width="190" height="76" rx="8" fill="#eaf3ff" stroke="#4f7bd9" stroke-width="2"/><text x="165.0" y="141.92" text-anchor="middle" font-size="15" font-weight="750" fill="#1f2d3d"><tspan x="165.0" dy="0.00em">vLLM MoE layer</tspan></text><text x="165.0" y="161.68" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="165.0" dy="0.00em">tokens + top-k</tspan></text><path d="M260,148 L330,148" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><rect x="330" y="110" width="190" height="76" rx="8" fill="#fff7df" stroke="#d8a500" stroke-width="2"/><text x="425.0" y="141.92" text-anchor="middle" font-size="15" font-weight="750" fill="#4a3a00"><tspan x="425.0" dy="0.00em">backend oracle</tspan></text><text x="425.0" y="161.68" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="425.0" dy="0.00em">dtype / shape / layout</tspan></text><path d="M520,148 L590,148" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><text x="555.0" y="140.0" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a"><tspan x="555.0" dy="0.00em">ok</tspan></text><rect x="590" y="90" width="180" height="76" rx="8" fill="#eef8ef" stroke="#5aa463" stroke-width="2"/><text x="680.0" y="121.92" text-anchor="middle" font-size="15" font-weight="750" fill="#1f3d24"><tspan x="680.0" dy="0.00em">DeepEP</tspan></text><text x="680.0" y="141.68" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="680.0" dy="0.00em">dispatch HT / LL</tspan></text><path d="M770,128 L830,128" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)"/><rect x="830" y="90" width="120" height="76" rx="8" fill="#f7eefb" stroke="#b042b4" stroke-width="2"/><text x="890.0" y="121.92" text-anchor="middle" font-size="15" font-weight="750" fill="#3b1e40"><tspan x="890.0" dy="0.00em">DeepGEMM</tspan></text><text x="890.0" y="141.68" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="890.0" dy="0.00em">compute</tspan></text><path d="M520,196 L590,265" fill="none" stroke="#57606a" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="7 6"/><text x="555.0" y="222.5" text-anchor="middle" font-size="12" font-weight="650" fill="#57606a"><tspan x="555.0" dy="0.00em">fallback</tspan></text><rect x="590" y="245" width="270" height="76" rx="8" fill="#fff1ed" stroke="#c95450" stroke-width="2"/><text x="725.0" y="276.92" text-anchor="middle" font-size="15" font-weight="750" fill="#4a1c1a"><tspan x="725.0" dy="0.00em">other MoE backend</tspan></text><text x="725.0" y="296.68" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="725.0" dy="0.00em">when alignment or dtype contract fails</tspan></text><rect x="170" y="365" width="660" height="58" rx="8" fill="#f6f8fa" stroke="#d0d7de" stroke-width="2"/><text x="500.0" y="389.36" text-anchor="middle" font-size="15" font-weight="750" fill="#24292f"><tspan x="500.0" dy="0.00em">Integration rule</tspan></text><text x="500.0" y="404.44" text-anchor="middle" font-size="12" font-weight="500" fill="#526170"><tspan x="500.0" dy="0.00em">DeepGEMM is fast only when the surrounding system gives it the expected routed layout and FP8 scale tensors.</tspan></text>
</svg>
