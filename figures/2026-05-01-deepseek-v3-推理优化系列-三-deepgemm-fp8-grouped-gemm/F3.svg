<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" font-family="sans-serif">
  <defs>
    <marker id="arr3" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a6fd3"/>
    </marker>
  </defs>

  <text x="500" y="26" text-anchor="middle" font-size="15" font-weight="700" fill="#222">Contiguous layout · 整 CTA 粒度 skip</text>
  <text x="500" y="46" text-anchor="middle" font-size="11" fill="#666">每个 expert M 段对齐到 BLOCK_M；m_indices 让 padding 行变 O(1) skip</text>

  <!-- Left: padded contiguous tensor A (M total) -->
  <text x="80" y="78" font-size="12" font-weight="700" fill="#333">A · 拼接后的 grouped 输入 (M_total × K)</text>

  <!-- Expert 0 valid -->
  <rect x="80" y="90" width="160" height="40" fill="#d8eed8" stroke="#5fa55f" stroke-width="1.5"/>
  <text x="160" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">expert 0 · valid (M_0=40)</text>
  <!-- Expert 0 padding -->
  <rect x="240" y="90" width="40" height="40" fill="#fff5f0" stroke="#b85450" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="260" y="115" text-anchor="middle" font-size="10" fill="#b85450">pad</text>

  <!-- Expert 1 valid -->
  <rect x="280" y="90" width="240" height="40" fill="#d8eed8" stroke="#5fa55f" stroke-width="1.5"/>
  <text x="400" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">expert 1 · valid (M_1=88)</text>
  <!-- Expert 1 padding -->
  <rect x="520" y="90" width="40" height="40" fill="#fff5f0" stroke="#b85450" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="540" y="115" text-anchor="middle" font-size="10" fill="#b85450">pad</text>

  <!-- Expert 2 valid -->
  <rect x="560" y="90" width="120" height="40" fill="#d8eed8" stroke="#5fa55f" stroke-width="1.5"/>
  <text x="620" y="115" text-anchor="middle" font-size="11" font-weight="700" fill="#2a5a2a">expert 2 · valid (M_2=24)</text>
  <!-- Expert 2 padding -->
  <rect x="680" y="90" width="40" height="40" fill="#fff5f0" stroke="#b85450" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="700" y="115" text-anchor="middle" font-size="10" fill="#b85450">pad</text>

  <!-- BLOCK_M ticks -->
  <g stroke="#888" stroke-width="0.7">
    <line x1="80" y1="135" x2="80" y2="148"/>
    <line x1="160" y1="135" x2="160" y2="148"/>
    <line x1="240" y1="135" x2="240" y2="148"/>
    <line x1="320" y1="135" x2="320" y2="148"/>
    <line x1="400" y1="135" x2="400" y2="148"/>
    <line x1="480" y1="135" x2="480" y2="148"/>
    <line x1="560" y1="135" x2="560" y2="148"/>
    <line x1="640" y1="135" x2="640" y2="148"/>
    <line x1="720" y1="135" x2="720" y2="148"/>
  </g>
  <text x="120" y="161" text-anchor="middle" font-size="10" fill="#666">B_M tile 0</text>
  <text x="200" y="161" text-anchor="middle" font-size="10" fill="#666">tile 1</text>
  <text x="280" y="161" text-anchor="middle" font-size="10" fill="#666">tile 2</text>
  <text x="360" y="161" text-anchor="middle" font-size="10" fill="#666">tile 3</text>
  <text x="440" y="161" text-anchor="middle" font-size="10" fill="#666">tile 4</text>
  <text x="520" y="161" text-anchor="middle" font-size="10" fill="#666">tile 5</text>
  <text x="600" y="161" text-anchor="middle" font-size="10" fill="#666">tile 6</text>
  <text x="680" y="161" text-anchor="middle" font-size="10" fill="#666">tile 7</text>

  <!-- m_indices array -->
  <text x="80" y="200" font-size="12" font-weight="700" fill="#333">m_indices · 每 tile 首行的 expert id</text>

  <g font-family="monospace" font-size="11">
    <rect x="80"  y="210" width="80" height="34" fill="#eef7ff" stroke="#4a6fd3"/>
    <text x="120" y="232" text-anchor="middle" fill="#1f3f8a">0</text>
    <rect x="160" y="210" width="80" height="34" fill="#eef7ff" stroke="#4a6fd3"/>
    <text x="200" y="232" text-anchor="middle" fill="#1f3f8a">0</text>
    <rect x="240" y="210" width="80" height="34" fill="#fff5f0" stroke="#b85450"/>
    <text x="280" y="232" text-anchor="middle" fill="#b85450">−1</text>
    <rect x="320" y="210" width="80" height="34" fill="#eef7ff" stroke="#4a6fd3"/>
    <text x="360" y="232" text-anchor="middle" fill="#1f3f8a">1</text>
    <rect x="400" y="210" width="80" height="34" fill="#eef7ff" stroke="#4a6fd3"/>
    <text x="440" y="232" text-anchor="middle" fill="#1f3f8a">1</text>
    <rect x="480" y="210" width="80" height="34" fill="#fff5f0" stroke="#b85450"/>
    <text x="520" y="232" text-anchor="middle" fill="#b85450">−1</text>
    <rect x="560" y="210" width="80" height="34" fill="#eef7ff" stroke="#4a6fd3"/>
    <text x="600" y="232" text-anchor="middle" fill="#1f3f8a">2</text>
    <rect x="640" y="210" width="80" height="34" fill="#fff5f0" stroke="#b85450"/>
    <text x="680" y="232" text-anchor="middle" fill="#b85450">−1</text>
  </g>

  <!-- Scheduler decision box -->
  <rect x="80" y="280" width="640" height="80" fill="#fff8e7" stroke="#e0b300" stroke-width="1.5" rx="6"/>
  <text x="100" y="304" font-size="12" font-weight="700" fill="#7a5a00">scheduler · 取一个 M tile 后的 O(1) 判断</text>
  <text x="100" y="324" font-family="monospace" font-size="11" fill="#444">m0 = m_offset + b_M · B_M</text>
  <text x="100" y="340" font-family="monospace" font-size="11" fill="#444">valid = m_indices[m0] ≥ 0   →   skip 整 CTA 还是入 mainloop</text>
  <text x="100" y="354" font-family="monospace" font-size="11" fill="#444">expert = max(0, m_indices[m0])  →  选取 W1_e / W2_e</text>

  <line x1="280" y1="244" x2="280" y2="278" stroke="#b85450" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arr3)"/>
  <line x1="600" y1="244" x2="600" y2="278" stroke="#5fa55f" stroke-width="1.5" marker-end="url(#arr3)"/>
</svg>
